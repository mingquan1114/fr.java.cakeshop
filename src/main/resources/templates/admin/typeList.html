<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>分类管理 - 蛋糕系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        .add-form {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--color-border);
        }
        .add-form input {
            flex: 1;
            max-width: 320px;
            padding: 10px 14px;
            border: 1px solid var(--input-border);
            border-radius: 7px;
            font-size: 13px;
            background: var(--input-bg);
            color: var(--color-text);
            outline: none;
            transition: border-color .25s;
        }
        .add-form input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .1);
        }
        .add-form input::placeholder {
            color: var(--color-text-light);
        }
        .type-count {
            color: var(--color-text-secondary);
            font-size: 13px;
        }
        .toast-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            pointer-events: none;
        }
        .toast-msg {
            background: #1e293b;
            color: #fff;
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .25);
            animation: fadeInOut 3s ease forwards;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast-msg.success {
            border-left: 4px solid var(--color-success);
        }
        .toast-msg.error {
            border-left: 4px solid var(--color-danger);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .admin-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg-badge);
            color: var(--color-text-secondary);
            border-radius: 20px;
            font-size: 13px;
        }
        .admin-badge i {
            font-size: 14px;
            color: var(--color-accent);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header"><i class="fas fa-birthday-cake"></i><span th:text="#{admin.sidebar.title}">蛋糕管理系统</span></div>
            <div class="menu-sep" th:text="#{admin.sidebar.mainMenu}">主菜单</div>
            <ul class="menu-item">
                <li th:class="${currentPage == 'index' ? 'active' : ''}"><a href="/admin/index"><i class="fas fa-tachometer-alt"></i><span th:text="#{admin.sidebar.dashboard}">控制台</span></a></li>
                <li th:class="${currentPage == 'userList' ? 'active open' : ''}"><a href="#"><i class="fas fa-users"></i><span th:text="#{admin.sidebar.userManagement}">用户管理</span></a>
                    <ul class="submenu">
                        <li><a href="/admin/userList" th:class="${currentPage == 'userList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.userList}">用户列表</span></a></li>
                    </ul>
                </li>
                <li th:class="${currentPage == 'goodsList' || currentPage == 'addGoods' ? 'active open' : ''}"><a href="#"><i class="fas fa-boxes"></i><span th:text="#{admin.sidebar.goodsManagement}">商品管理</span></a>
                    <ul class="submenu">
                        <li><a href="/admin/goodsList" th:class="${currentPage == 'goodsList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.goodsList}">商品列表</span></a></li>
                        <li><a href="/admin/addGoods" th:class="${currentPage == 'addGoods' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.addGoods}">新增商品</span></a></li>
                    </ul>
                </li>
                <li th:class="${currentPage == 'typeList' ? 'active open' : ''}"><a href="#"><i class="fas fa-tags"></i><span th:text="#{admin.sidebar.categoryManagement}">分类管理</span></a>
                    <ul class="submenu">
                        <li><a href="/admin/typeList" th:class="${currentPage == 'typeList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.categoryList}">分类列表</span></a></li>
                    </ul>
                </li>
                <li th:class="${currentPage == 'orderList' ? 'active open' : ''}"><a href="#"><i class="fas fa-shopping-cart"></i><span th:text="#{admin.sidebar.orderManagement}">订单管理</span></a>
                    <ul class="submenu">
                        <li><a href="/admin/orderList" th:class="${currentPage == 'orderList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.orderList}">所有订单</span></a></li>
                    </ul>
                </li>
                <li th:class="${currentPage == 'adminSetting' || currentPage == 'logList' ? 'active open' : ''}"><a href="/admin/adminSetting"><i class="fas fa-cogs"></i><span th:text="#{admin.sidebar.systemManagement}">系统管理</span></a>
                    <ul class="submenu">
                        <li><a href="/admin/adminSetting" th:class="${currentPage == 'adminSetting' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.adminSettings}">管理员设置</span></a></li>
                        <li><a href="/admin/logList" th:class="${currentPage == 'logList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.logManagement}">日志管理</span></a></li>
                    </ul>
                </li>
            </ul>
        </aside>
        <main class="main-content">
            <header class="top-header">
                <h1><i class="fas fa-tags"></i><span th:text="#{admin.category.title}">分类管理</span></h1>
                <div class="header-right">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i><span id="themeLabel" th:text="#{admin.theme.light}">日间模式</span></button>
                    <div class="lang-switch">
                        <select id="langSelect" onchange="switchLang(this.value)">
                            <option value="zh" th:text="#{admin.lang.zh}" th:selected="${#locale.language == 'zh'}">中文</option>
                            <option value="en" th:text="#{admin.lang.en}" th:selected="${#locale.language == 'en'}">English</option>
                            <option value="ja" th:text="#{admin.lang.ja}" th:selected="${#locale.language == 'ja'}">日本語</option>
                        </select>
                    </div>
                    <div class="admin-badge"><i class="fas fa-user-shield"></i><span th:text="#{admin.welcome}">欢迎</span>，<span th:text="${adminName}"></span></div>
                    <button class="logout-btn" onclick="location.href='/user/loginout'"><i class="fas fa-sign-out-alt"></i><span th:text="#{admin.logout}">退出</span></button>
                </div>
            </header>
            <div class="content-body">
                <div th:if="${msg != null}" class="toast-overlay">
                    <div class="toast-msg" th:classappend="${msg.contains('成功') || msg.contains('已') ? 'success' : 'error'}" id="toastMsg">
                        <i th:class="${msg.contains('成功') || msg.contains('已') ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'}"></i>
                        <span th:text="${msg}"></span>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header"><h2 class="panel-title" th:text="#{admin.category.list}">分类列表</h2> <span class="badge-count" th:text="${typeList != null ? typeList.size() : 0}">0</span></div>
                    <form class="add-form" th:action="@{/admin/saveType}" method="post">
                        <input type="text" name="name" th:placeholder="#{admin.category.name.placeholder}" required>
                        <button class="btn btn-green"><i class="fas fa-plus"></i><span th:text="#{admin.category.add}">添加分类</span></button>
                    </form>
                    <div class="table-wrap">
                        <table class="data-table">
                            <thead>
                                <tr><th>ID</th><th th:text="#{admin.category.name}">分类名称</th><th th:text="#{admin.category.goods}">商品数量</th><th th:text="#{common.actions}">操作</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="t : ${typeList}">
                                    <td th:text="${t.id}"></td>
                                    <td><strong th:text="${t.nameEn != null ? t.nameEn : t.name}"></strong></td>
                                    <td><span class="type-count"><i class="fas fa-box"></i> <span th:text="${typeGoodsCount != null ? typeGoodsCount.get(t.id) : 0}">0</span> <span th:text="#{admin.goods.unit}">件</span></span></td>
                                    <td>
                                        <a class="btn btn-indigo" th:href="@{/admin/typeGoods(typeId=${t.id})}"><i class="fas fa-eye"></i><span th:text="#{admin.category.viewGoods}">查看商品</span></a>
                                        <button class="btn btn-red" th:onclick="'if(confirm(\'' + '#{admin.category.delete.confirm}' + '\'))location.href=\'/admin/deleteType?id=' + ${t.id} + '\''"><i class="fas fa-trash"></i><span th:text="#{common.delete}">删除</span></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${typeList == null || typeList.isEmpty()}" class="empty-state"><i class="fas fa-tags"></i><span th:text="#{admin.category.empty}">暂无分类数据</span></div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
    <script>
        (function(){
            var m=document.getElementById('toastMsg');
            if(m) setTimeout(function(){m.parentElement.remove()},3000);
            document.querySelectorAll('.sidebar .menu-item>li>a').forEach(function(a){
                a.addEventListener('click',function(e){
                    var li=a.parentElement,sub=li.querySelector('.submenu');
                    if(sub){e.preventDefault();li.classList.toggle('open')}})})
        })();
        function toggleTheme(){
            var body=document.body;
            var current=body.getAttribute('data-theme');
            var next=current==='dark'?'light':'dark';
            body.setAttribute('data-theme',next);
            localStorage.setItem('theme',next);
            var icon=document.getElementById('themeIcon');
            var label=document.getElementById('themeLabel');
            if(next==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}
            else{icon.className='fas fa-sun';label.textContent='日间模式'}
        }
        function switchLang(lang){
            var url=new URL(window.location.href);
            url.searchParams.set('lang',lang);
            window.location.href=url.toString()
        }
        (function(){
            var theme=localStorage.getItem('theme')||'light';
            document.body.setAttribute('data-theme',theme);
            var icon=document.getElementById('themeIcon');
            var label=document.getElementById('themeLabel');
            if(icon&&label){
                if(theme==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}
                else{icon.className='fas fa-sun';label.textContent='日间模式'}
            }
        })();
    </script>
</body>
</html>
