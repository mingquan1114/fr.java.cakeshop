<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title th:text="#{admin.goods.detail.title}">商品详情 - 蛋糕系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;min-height:100vh}
.admin-container{display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);color:#fff;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;z-index:100;box-shadow:2px 0 20px rgba(0,0,0,.1)}
.sidebar-header{padding:24px 20px;background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);text-align:center;font-size:18px;font-weight:700;letter-spacing:1px}
.sidebar .menu-item{list-style:none;padding:0;margin:8px 0}
.sidebar .menu-item>li{position:relative}
.sidebar .menu-item>li>a{display:flex;align-items:center;padding:13px 20px;color:#94a3b8;text-decoration:none;transition:all .25s ease;font-size:13.5px;font-weight:500;gap:10px}
.sidebar .menu-item>li>a:hover{background:rgba(255,255,255,.08);color:#e2e8f0;padding-left:24px}
.sidebar .menu-item>li>a i{width:18px;text-align:center;font-size:14px}
.sidebar .menu-item>li.active>a{background:rgba(59,130,246,.25);color:#fff;border-left:3px solid #3b82f6}
.sidebar .menu-item>li>a::after{content:'\f107';font-family:'Font Awesome 5 Free';font-weight:900;margin-left:auto;font-size:11px;transition:transform .3s ease}
.sidebar .menu-item>li:not(:has(.submenu))>a::after{display:none}
.sidebar .menu-item .submenu{display:none;background:rgba(0,0,0,.15);list-style:none}
.sidebar .menu-item>li.open .submenu{display:block}
.sidebar .menu-item>li.open>a::after{transform:rotate(180deg)}
.submenu li a{display:block;padding:11px 20px 11px 48px;color:#94a3b8;text-decoration:none;font-size:13px;transition:all .25s ease}
.submenu li a:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.submenu li a.active-sub{background:rgba(59,130,246,.2);color:#60a5fa;font-weight:600}
.menu-sep{padding:8px 20px 4px;font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.main-content{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.top-header{background:#fff;padding:14px 30px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0}
.top-header h1{font-size:18px;font-weight:700;color:#1e293b;margin:0}
.top-header h1 i{margin-right:8px;color:#3b82f6}
.header-right{display:flex;align-items:center;gap:20px}
.admin-badge{display:flex;align-items:center;gap:8px;background:#f1f5f9;padding:6px 14px;border-radius:20px;font-size:13px;color:#475569}
.admin-badge i{color:#3b82f6}.admin-badge span{font-weight:600;color:#1e293b}
.logout-btn{padding:7px 18px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px}
.logout-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(239,68,68,.3)}
.content-body{padding:24px 30px;flex:1}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;color:#475569;text-decoration:none;font-size:13px;font-weight:600;transition:all .25s;margin-bottom:20px}
.back-btn:hover{background:#f8fafc;border-color:#cbd5e1;color:#1e293b}
.panel{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);overflow:hidden;border:1px solid #e2e8f0;max-width:800px;margin:0 auto}
.panel-header{padding:24px 30px;border-bottom:1px solid #e2e8f0;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a855f7 100%);color:#fff;display:flex;align-items:center;gap:12px}
.panel-header h2{font-size:20px;font-weight:700;margin:0}
.panel-header i{font-size:20px}
.detail-content{padding:30px}
.detail-image{width:100%;max-height:350px;object-fit:cover;border-radius:16px;margin-bottom:28px;box-shadow:0 6px 24px rgba(0,0,0,.12)}
.detail-price{color:#dc2626;font-size:32px;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:8px}
.detail-price::before{content:'¥';font-size:24px}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:28px}
.detail-item{background:linear-gradient(145deg,#f8fafc,#f1f5f9);padding:20px;border-radius:14px;border:1px solid #e2e8f0;transition:all .3s ease}
.detail-item:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.detail-label{font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.detail-label::before{content:'';width:4px;height:4px;background:#6366f1;border-radius:50%}
.detail-value{font-size:16px;color:#1e293b;font-weight:700}
.detail-desc{background:linear-gradient(145deg,#f0fdf4,#dcfce7);padding:24px;border-radius:16px;border-left:4px solid #22c55e;margin-top:28px}
.detail-desc-title{font-size:15px;font-weight:700;color:#166534;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.detail-desc-content{font-size:15px;color:#166534;line-height:1.8}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s ease}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3)}
.btn-blue:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,130,246,.4)}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 14px rgba(34,197,94,.3)}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(34,197,94,.4)}
.btn-group{display:flex;gap:16px;margin-top:32px;justify-content:flex-start}
.empty-state{text-align:center;padding:60px;color:#94a3b8}
.empty-state i{font-size:50px;margin-bottom:16px}
.empty-state h3{font-size:18px;margin-bottom:8px}
@media(max-width:768px){.sidebar{width:100%;position:relative}.main-content{margin-left:0}.detail-grid{grid-template-columns:1fr}}
:root{--bg:#f0f2f5;--text:#1e293b;-text-secondary:#64748b}
[data-theme="dark"]{--bg:#0f172a;--text:#e2e8f0;}
body[data-theme="dark"]{background:var(--bg);color:var(--text)}
.theme-toggle{background:#f1f5f9;color:#475569;border:none;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:6px}
.theme-toggle:hover{opacity:.8}
</style>
</head>
<body>
<div class="admin-container">
<aside class="sidebar">
<div class="sidebar-header"><i class="fas fa-birthday-cake"></i><span th:text="#{admin.sidebar.title}">蛋糕管理系统</span></div>
<div class="menu-sep" th:text="#{admin.sidebar.mainMenu}">主菜单</div>
<ul class="menu-item">
<li th:class="${currentPage == 'index' ? 'active' : ''}"><a href="/admin/index"><i class="fas fa-tachometer-alt"></i><span th:text="#{admin.sidebar.dashboard}">控制台</span></a></li>
<li th:class="${currentPage == 'userList' ? 'active open' : ''}"><a href="#"><i class="fas fa-users"></i><span th:text="#{admin.sidebar.userManagement}">用户管理</span></a><ul class="submenu"><li><a href="/admin/userList" th:class="${currentPage == 'userList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.userList}">用户列表</span></a></li></ul></li>
<li th:class="${currentPage == 'goodsList' || currentPage == 'addGoods' || currentPage == 'goodsDetail' ? 'active open' : ''}"><a href="#"><i class="fas fa-boxes"></i><span th:text="#{admin.sidebar.goodsManagement}">商品管理</span></a><ul class="submenu"><li><a href="/admin/goodsList" th:class="${currentPage == 'goodsList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.goodsList}">商品列表</span></a></li><li><a href="/admin/addGoods" th:class="${currentPage == 'addGoods' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.addGoods}">新增商品</span></a></li></ul></li>
<li th:class="${currentPage == 'typeList' ? 'active open' : ''}"><a href="#"><i class="fas fa-tags"></i><span th:text="#{admin.sidebar.categoryManagement}">分类管理</span></a><ul class="submenu"><li><a href="/admin/typeList" th:class="${currentPage == 'typeList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.categoryList}">分类列表</span></a></li></ul></li>
<li th:class="${currentPage == 'orderList' ? 'active open' : ''}"><a href="#"><i class="fas fa-shopping-cart"></i><span th:text="#{admin.sidebar.orderManagement}">订单管理</span></a><ul class="submenu"><li><a href="/admin/orderList" th:class="${currentPage == 'orderList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.orderList}">所有订单</span></a></li></ul></li>
<li th:class="${currentPage == 'adminSetting' || currentPage == 'logList' ? 'active open' : ''}"><a href="/admin/adminSetting"><i class="fas fa-cogs"></i><span th:text="#{admin.sidebar.systemManagement}">系统管理</span></a><ul class="submenu"><li><a href="/admin/adminSetting" th:class="${currentPage == 'adminSetting' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.adminSetting}">管理员设置</span></a></li><li><a href="/admin/logList" th:class="${currentPage == 'logList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.logList}">日志管理</span></a></li></ul></li>
</ul>
</aside>

<main class="main-content">
<header class="top-header"><h1><i class="fas fa-eye"></i><span th:text="#{admin.goods.detail.title}">商品详情</span></h1>
<div class="header-right"><button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i><span id="themeLabel" th:text="#{admin.lang.day}">日间模式</span></button>
<div class="lang-switch" style="display:inline-flex;align-items:center;gap:6px;color:#475569;font-size:13px;font-weight:600;">
<select id="langSelect" onchange="switchLang(this.value)" style="padding:4px 8px;border-radius:4px;border:1px solid #e2e8f0;background:#fff;color:#475569;font-size:13px;">
<option value="zh" th:text="#{admin.lang.zh}" th:selected="${#locale.language == 'zh'}">中文</option>
<option value="en" th:text="#{admin.lang.en}" th:selected="${#locale.language == 'en'}">English</option>
<option value="ja" th:text="#{admin.lang.ja}" th:selected="${#locale.language == 'ja'}">日本語</option>
</select>
</div>
<div class="admin-badge"><i class="fas fa-user-shield"></i><span th:text="#{admin.welcome}">欢迎</span>，<span th:text="${adminName}"></span></div><button class="logout-btn" onclick="location.href='/user/loginout'"><i class="fas fa-sign-out-alt"></i><span th:text="#{common.logout}">退出</span></button></div>
</header>

<div class="content-body">
<a href="/admin/goodsList" class="back-btn"><i class="fas fa-arrow-left"></i><span th:text="#{common.back}"></span>返回列表</span></a>

<div th:if="${goods != null}" class="panel">
<div class="panel-header">
<h2><i class="fas fa-box"></i><span th:text="#{admin.goods.info}">商品信息</span></h2>
</div>
<div class="detail-content">
<img th:src="@{${goods.cover}}" class="detail-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22400%22 height=%22300%22/%3E%3Ctext x=%22200%22 y=%22165%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2216%22%3E商品图片%3C/text%3E%3C/svg%3E'">
<div class="detail-price">¥<span th:text="${goods.price}"></span></div>
<div class="detail-grid">
<div class="detail-item"><div class="detail-label" th:text="#{admin.goods.id}">商品ID</div><div class="detail-value" th:text="${goods.id}"></div></div>
<div class="detail-item"><div class="detail-label" th:text="#{admin.goods.name}">商品名称</div><div class="detail-value" th:text="${goods.nameEn != null ? goods.nameEn : goods.name}"></div></div>
<div class="detail-item"><div class="detail-label" th:text="#{admin.goods.category}">商品分类</div><div class="detail-value" th:text="${goods.typeNameEn != null ? goods.typeNameEn : (goods.typeName != null ? goods.typeName : goods.type_id)}"></div></div>
<div class="detail-item"><div class="detail-label" th:text="#{admin.goods.stock}">库存数量</div><div class="detail-value" th:text="${goods.stock}"></div></div>
</div>
<div th:if="${goods.intro != null and !#strings.isEmpty(goods.intro)}" class="detail-desc">
<div class="detail-desc-title"><i class="fas fa-info-circle"></i><span th:text="#{admin.goods.intro}">商品介绍</span></div>
<div class="detail-desc-content" th:text="${goods.intro}"></div>
</div>
<div class="btn-group">
<button class="btn btn-blue" th:onclick="'location.href=\'/admin/goodsEdit?id=' + ${goods.id} + '\''"><i class="fas fa-edit"></i><span th:text="#{admin.goods.edit}">编辑商品</span></button>
<button class="btn btn-green" onclick="location.href='/admin/goodsList'"><i class="fas fa-arrow-left"></i><span th:text="#{common.back}">返回列表</span></button>
</div>
</div>
</div>

<div th:if="${goods == null}" class="empty-state">
<i class="fas fa-search"></i>
<h3 th:text="#{admin.goods.not.found}">商品不存在</h3>
<p th:text="#{admin.goods.not.found.desc}">未找到该商品或商品已被删除</p>
<button class="btn btn-blue" onclick="location.href='/admin/goodsList'"><i class="fas fa-arrow-left"></i><span th:text="#{common.back}">返回列表</span></button>
</div>
</div>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
<script>
(function(){
    document.querySelectorAll('.sidebar .menu-item>li>a').forEach(function(a){
        a.addEventListener('click',function(e){
            var li=a.parentElement,sub=li.querySelector('.submenu');
            if(sub){e.preventDefault();li.classList.toggle('open')}
        })
    });
})();

function toggleTheme(){var body=document.body;var current=body.getAttribute('data-theme');var next=current==='dark'?'light':'dark';body.setAttribute('data-theme',next);localStorage.setItem('theme',next);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(next==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}else{icon.className='fas fa-sun';label.textContent='日间模式'}}
function switchLang(lang){var url=new URL(window.location.href);url.searchParams.set('lang',lang);window.location.href=url.toString()}
(function(){var theme=localStorage.getItem('theme')||'light';document.body.setAttribute('data-theme',theme);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(icon&&label){if(theme==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}else{icon.className='fas fa-sun';label.textContent='日间模式'}}})();
</script>
</body>
</html>
