<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户管理 - 蛋糕系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/theme.css">
    <style type="text/css">
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;z-index:10000;backdrop-filter:blur(4px)}
        .modal-overlay.show{display:block}
        .modal-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-panel);border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center;box-shadow:var(--shadow-modal);animation:modalFadeIn .3s ease;border:1px solid var(--color-border)}
        @keyframes modalFadeIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.9) translateY(20px)}100%{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}}
        .modal-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#fca5a5,#ef4444);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff}
        .modal-icon.warning{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
        .modal-icon.success{background:linear-gradient(135deg,#22c55e,#16a34a)}
        .modal-title{font-size:18px;font-weight:700;color:var(--color-text);margin:0 0 10px}
        .modal-text{font-size:14px;color:var(--color-text-secondary);margin:0 0 24px}
        .modal-btn{padding:10px 32px;background:linear-gradient(135deg,var(--color-accent),var(--color-accent-hover));color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s}
        .modal-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.3)}
        .modal-btn.cancel{background:var(--bg-btn-light);color:var(--color-text-secondary)}.modal-btn.cancel:hover{background:var(--bg-hover);box-shadow:none}
        .modal-btn-group{display:flex;justify-content:center;gap:12px}
        .search-box{display:flex;gap:8px}
        .search-box input{padding:9px 14px;border:1px solid var(--color-border);border-radius:8px;font-size:13px;width:220px;transition:border-color .25s;outline:none;background:var(--bg-secondary);color:var(--color-text)}
        .search-box input:focus{border-color:var(--color-accent);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
        .search-box input::placeholder{color:var(--color-text-light)}
        .btn-amber{background:var(--color-warning);color:#1e293b}.btn-amber:hover{background:var(--color-warning-hover)}
        .btn-light{background:var(--bg-btn-light);color:var(--color-text-secondary)}.btn-light:hover{background:var(--bg-hover)}
        .badge-green{background:#166534;color:#4ade80}
        .badge-amber{background:#92400e;color:#fbbf24}
        .badge-blue{background:#1e40af;color:#60a5fa}
        .badge-purple{background:#6b21a8;color:#a78bfa}
        .action-group{display:flex;gap:6px;flex-wrap:wrap}
        .action-group .btn{padding:6px 11px;font-size:11.5px;border-radius:5px}
    </style>
</head>
<body>
<div class="admin-container">
    <aside class="sidebar">
        <div class="sidebar-header"><i class="fas fa-birthday-cake"></i><span th:text="#{admin.sidebar.title}">蛋糕管理系统</span></div>
        <div class="menu-sep" th:text="#{admin.sidebar.mainMenu}">主菜单</div>
        <ul class="menu-item">
            <li th:class="${currentPage == 'index' ? 'active' : ''}">
                <a href="/admin/index"><i class="fas fa-tachometer-alt"></i><span th:text="#{admin.sidebar.dashboard}">控制台</span></a>
            </li>
            <li th:class="${currentPage == 'userList' ? 'active open' : ''}">
                <a href="#"><i class="fas fa-users"></i><span th:text="#{admin.sidebar.userManagement}">用户管理</span></a>
                <ul class="submenu">
                    <li><a href="/admin/userList" th:class="${currentPage == 'userList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.userList}">用户列表</span></a></li>
                </ul>
            </li>
            <li th:class="${currentPage == 'goodsList' || currentPage == 'addGoods' ? 'active open' : ''}">
                <a href="#"><i class="fas fa-boxes"></i><span th:text="#{admin.sidebar.goodsManagement}">商品管理</span></a>
                <ul class="submenu">
                    <li><a href="/admin/goodsList" th:class="${currentPage == 'goodsList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.goodsList}">商品列表</span></a></li>
                    <li><a href="/admin/addGoods" th:class="${currentPage == 'addGoods' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.addGoods}">新增商品</span></a></li>
                </ul>
            </li>
            <li th:class="${currentPage == 'typeList' ? 'active open' : ''}">
                <a href="#"><i class="fas fa-tags"></i><span th:text="#{admin.sidebar.categoryManagement}">分类管理</span></a>
                <ul class="submenu">
                    <li><a href="/admin/typeList" th:class="${currentPage == 'typeList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.categoryList}">分类列表</span></a></li>
                </ul>
            </li>
            <li th:class="${currentPage == 'orderList' ? 'active open' : ''}">
                <a href="#"><i class="fas fa-shopping-cart"></i><span th:text="#{admin.sidebar.orderManagement}">订单管理</span></a>
                <ul class="submenu">
                    <li><a href="/admin/orderList" th:class="${currentPage == 'orderList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.orderList}">所有订单</span></a></li>
                </ul>
            </li>
            <li th:class="${currentPage == 'adminSetting' || currentPage == 'logList' ? 'active open' : ''}"><a href="/admin/adminSetting"><i class="fas fa-cogs"></i><span th:text="#{admin.sidebar.systemManagement}">系统管理</span></a><ul class="submenu"><li><a href="/admin/adminSetting" th:class="${currentPage == 'adminSetting' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.adminSetting}">管理员设置</span></a></li><li><a href="/admin/logList" th:class="${currentPage == 'logList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.logManagement}">日志管理</span></a></li></ul></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1><i class="fas fa-users"></i>用户管理</h1>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i><span id="themeLabel" th:text="#{admin.theme.light}">日间模式</span></button>
<div class="lang-switch">
<select id="langSelect" onchange="switchLang(this.value)">
<option value="zh" th:text="#{admin.lang.zh}" th:selected="${#locale.language == 'zh'}">中文</option>
                <option value="en" th:text="#{admin.lang.en}" th:selected="${#locale.language == 'en'}">English</option>
                <option value="ja" th:text="#{admin.lang.ja}" th:selected="${#locale.language == 'ja'}">日本語</option>
</select>
</div>
                <div class="admin-badge"><i class="fas fa-user-shield"></i><span th:text="#{admin.welcome}">欢迎</span>，<span th:text="${adminName}"></span></div>
                <button class="logout-btn" onclick="location.href='/user/loginout'"><i class="fas fa-sign-out-alt"></i><span th:text="#{admin.logout}">退出</span></button>
            </div>
        </header>

        <div class="content-body">
            <div th:if="${msg != null}" class="toast-overlay">
                <div class="toast-msg" th:classappend="${msg.contains('成功') || msg.contains('已') || msg.contains('通过') ? 'success' : 'error'}" id="toastMsg">
                    <i th:class="${msg.contains('成功') || msg.contains('已') || msg.contains('通过') ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'}"></i>
                    <span th:text="${msg}"></span>
                </div>
            </div>

            <div th:if="${errorMsg != null}" class="modal-overlay show" id="errorModal">
                <div class="modal-box">
                    <div class="modal-icon"><i class="fas fa-exclamation-circle"></i></div>
                    <h3 class="modal-title">操作失败</h3>
                    <p class="modal-text" th:text="${errorMsg}"></p>
                    <button class="modal-btn" onclick="document.getElementById('errorModal').classList.remove('show')">确定</button>
                </div>
            </div>

            <div class="modal-overlay" id="confirmModal">
                <div class="modal-box">
                    <div class="modal-icon warning" id="confirmIcon"><i class="fas fa-exclamation-triangle"></i></div>
                    <h3 class="modal-title" id="confirmTitle">确认操作</h3>
                    <p class="modal-text" id="confirmText"></p>
                    <div class="modal-btn-group">
                        <button class="modal-btn cancel" onclick="document.getElementById('confirmModal').classList.remove('show')">取消</button>
                        <button class="modal-btn" id="confirmBtn">确定</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title" th:text="#{admin.user.list.title}">用户列表 <span class="badge-count" th:text="${userList != null ? userList.size() : 0}">0</span></h2>
                    <form class="search-box" th:action="@{/admin/userList}" method="get">
                        <input type="text" name="keyword" th:value="${keyword}" th:placeholder="#{admin.user.search.placeholder}">
                        <button type="submit" class="btn btn-blue"><i class="fas fa-search"></i><span th:text="#{common.search}">搜索</span></button>
                    </form>
                </div>

                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>ID</th><th th:text="#{admin.user.username}">用户名</th><th th:text="#{admin.user.email}">邮箱</th><th th:text="#{admin.user.name}">姓名</th><th th:text="#{admin.user.phone}">电话</th><th th:text="#{admin.user.address}">地址</th><th th:text="#{admin.user.role}">身份</th><th th:text="#{admin.user.status}">审核状态</th><th th:text="#{common.actions}">操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${userList}">
                            <td th:text="${u.id}"></td>
                            <td><strong th:text="${u.nameDisplay != null ? u.nameDisplay : u.username}"></strong></td>
                            <td th:text="${u.email}"></td>
                            <td th:text="${u.nameDisplay != null ? u.nameDisplay : u.name}"></td>
                            <td th:text="${u.phone}"></td>
                            <td th:text="${u.addressDisplay != null ? u.addressDisplay : u.address}"></td>
                            <td><span class="badge" th:class="${u.isadmin == '1' || u.isadmin == 1 ? 'badge-purple' : 'badge-blue'}" th:text="${u.roleDisplay}"></span></td>
                            <td><span class="badge" th:class="${u.isvalidate == '1' || u.isvalidate == 1 ? 'badge-green' : 'badge-amber'}" th:text="${u.statusDisplay}"></span></td>
                            <td>
                                <div class="action-group">
                                    <button class="btn btn-blue" th:onclick="'location.href=\'/admin/userEdit?id=' + ${u.id} + '\''"><i class="fas fa-edit"></i><span th:text="#{common.edit}">编辑</span></button>
                                    <th:block th:if="${u.isvalidate == '0' || u.isvalidate == 0}">
                                        <button class="btn btn-green" th:attr="data-title=#{admin.user.validate.title}, data-confirm=#{admin.user.validate.confirm}, data-url='/admin/validateUser?id=' + ${u.id}" onclick="confirmAndGo(this)"><i class="fas fa-check"></i><span th:text="#{admin.user.validate}">审核</span></button>
                                    </th:block>
                                    <button class="btn btn-amber" th:attr="data-title=#{admin.user.role.title}, data-confirm=#{admin.user.role.confirm}, data-url='/admin/toggleUserRole?id=' + ${u.id}" onclick="confirmAndGo(this)"><i class="fas fa-exchange-alt"></i><span th:text="#{admin.user.role.set}">权限</span></button>
                                    <button class="btn btn-red" th:attr="data-title=#{admin.user.delete.title}, data-confirm=#{admin.user.delete.confirm}, data-url='/admin/deleteUser?id=' + ${u.id}" onclick="confirmAndGo(this)"><i class="fas fa-trash"></i><span th:text="#{common.delete}">删除</span></button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${userList == null || userList.isEmpty()}" class="empty-state">
                    <i class="fas fa-users-slash"></i><span th:text="#{admin.user.empty}">暂无用户数据</span>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
<script>
var translations = {
    '管理员': '[#{db.role.管理员}]',
    '普通用户': '[#{db.role.普通用户}]',
    '已审核': '[#{db.user.status.已审核}]',
    '待审核': '[#{db.user.status.待审核}]'
};

function translateDbContent() {
    document.querySelectorAll('.translate-db').forEach(function(el) {
        var text = el.textContent.trim();
        if (translations[text]) {
            el.textContent = translations[text].replace(/\[|\]/g, '');
        }
    });
}

(function(){
    var m=document.getElementById('toastMsg');
    if(m)setTimeout(function(){m.parentElement.remove()},3000);
    document.querySelectorAll('.sidebar .menu-item>li>a').forEach(function(a){
        a.addEventListener('click',function(e){
            var li=a.parentElement,sub=li.querySelector('.submenu');
            if(sub){e.preventDefault();li.classList.toggle('open')}
        })
    })
    translateDbContent();
})()

function showConfirmModal(title, message, url) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmText').textContent = message;
    document.getElementById('confirmBtn').onclick = function() {
        location.href = url;
    };
    document.getElementById('confirmModal').classList.add('show');
}

function confirmAndGo(btn) {
    var title = btn.getAttribute('data-title');
    var confirmMsg = btn.getAttribute('data-confirm');
    var url = btn.getAttribute('data-url');
    showConfirmModal(title, confirmMsg, url);
}

function toggleTheme() {
    var body = document.body;
    var current = body.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    var icon = document.getElementById('themeIcon');
    var label = document.getElementById('themeLabel');
    if (icon && label) {
        if (next === 'dark') {
            icon.className = 'fas fa-moon';
            label.textContent = '夜间模式';
        } else {
            icon.className = 'fas fa-sun';
            label.textContent = '日间模式';
        }
    }
}

function switchLang(lang) {
    var url = new URL(window.location.href);
    url.searchParams.set('lang', lang);
    window.location.href = url.toString();
}

(function() {
    var theme = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', theme);
    var icon = document.getElementById('themeIcon');
    var label = document.getElementById('themeLabel');
    if (icon && label) {
        if (theme === 'dark') {
            icon.className = 'fas fa-moon';
            label.textContent = '夜间模式';
        } else {
            icon.className = 'fas fa-sun';
            label.textContent = '日间模式';
        }
    }
})();
</script>
</body>
</html>
