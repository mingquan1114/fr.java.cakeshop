<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>编辑商品 - 蛋糕系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link rel="stylesheet" href="/css/theme.css">
<style>
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:1200px){.form-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}}
.form-row-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-size:13px;color:var(--color-text);font-weight:500}
.form-group input,.form-group select,.form-group textarea{padding:10px 14px;border:1px solid var(--input-border);border-radius:6px;font-size:14px;color:var(--color-text);transition:all .2s ease;background:var(--input-bg)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--color-accent);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-group textarea{resize:vertical;min-height:100px}
.form-group .image-upload-container{display:flex;flex-direction:column;gap:10px}
.form-group .image-preview{width:120px;height:120px;border:2px dashed var(--input-border);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg-badge)}
.form-group .image-preview img{width:100%;height:100%;object-fit:cover}
.form-group .image-preview.empty{color:var(--color-text-light);font-size:12px}
.form-group .image-preview.empty i{font-size:24px;margin-bottom:4px}
.form-group .upload-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--color-accent);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s ease;width:fit-content}
.form-group .upload-btn:hover{background:var(--color-accent-hover)}
.form-group .upload-btn input[type="file"]{display:none}
.form-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid var(--color-border)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s ease}
.btn-primary{background:var(--color-accent);color:#fff}
.btn-primary:hover{background:var(--color-accent-hover)}
.btn-light{background:var(--bg-btn-light);color:var(--color-text);border:1px solid var(--input-border)}
.btn-light:hover{background:var(--bg-hover)}
.toast-overlay{position:fixed;top:20px;right:20px;z-index:1000;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-msg{display:flex;align-items:center;gap:10px;padding:14px 20px;border-radius:8px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast-msg.success{background:#166534;color:#4ade80}
.toast-msg.error{background:#991b1b;color:#fca5a5}
.loading-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(30,41,59,.8);display:flex;align-items:center;justify-content:center;border-radius:8px}
.loading-overlay i{font-size:20px;color:var(--color-accent);animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.admin-badge{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg-badge);color:var(--color-text-secondary);border-radius:20px;font-size:13px}
.admin-badge i{font-size:14px;color:var(--color-accent)}
</style>
</head>
<body>
<div class="admin-container">
<aside class="sidebar">
<div class="sidebar-header"><i class="fas fa-birthday-cake"></i>蛋糕管理系统</div>
<div class="menu-sep">主菜单</div>
<ul class="menu-item">
<li th:class="${currentPage == 'index' ? 'active' : ''}"><a href="/admin/index"><i class="fas fa-tachometer-alt"></i>控制台</a></li>
<li th:class="${currentPage == 'userList' ? 'active open' : ''}"><a href="#"><i class="fas fa-users"></i>用户管理</a>
<ul class="submenu">
<li><a href="/admin/userList" th:class="${currentPage == 'userList' ? 'active-sub' : ''}">用户列表</a></li>
</ul></li>
<li th:class="${currentPage == 'goodsList' || currentPage == 'addGoods' ? 'active open' : ''}"><a href="#"><i class="fas fa-boxes"></i>商品管理</a>
<ul class="submenu">
<li><a href="/admin/goodsList" th:class="${currentPage == 'goodsList' ? 'active-sub' : ''}">商品列表</a></li>
<li><a href="/admin/addGoods" th:class="${currentPage == 'addGoods' ? 'active-sub' : ''}">新增商品</a></li>
</ul></li>
<li th:class="${currentPage == 'typeList' ? 'active open' : ''}"><a href="#"><i class="fas fa-tags"></i>分类管理</a>
<ul class="submenu">
<li><a href="/admin/typeList" th:class="${currentPage == 'typeList' ? 'active-sub' : ''}">分类列表</a></li>
</ul></li>
<li th:class="${currentPage == 'orderList' ? 'active open' : ''}"><a href="#"><i class="fas fa-shopping-cart"></i>订单管理</a>
<ul class="submenu">
<li><a href="/admin/orderList" th:class="${currentPage == 'orderList' ? 'active-sub' : ''}">所有订单</a></li>
</ul></li>
<li th:class="${currentPage == 'adminSetting' || currentPage == 'logList' ? 'active open' : ''}"><a href="/admin/adminSetting"><i class="fas fa-cogs"></i>系统管理</a><ul class="submenu"><li><a href="/admin/adminSetting" th:class="${currentPage == 'adminSetting' ? 'active-sub' : ''}">管理员设置</a></li><li><a href="/admin/logList" th:class="${currentPage == 'logList' ? 'active-sub' : ''}">日志管理</a></li></ul></li>
</ul>
</aside>
<main class="main-content">
<header class="top-header">
<h1><i class="fas fa-edit"></i>编辑商品</h1>
<div class="header-right">
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i><span id="themeLabel">日间模式</span></button>
<div class="lang-switch" style="display:inline-flex;align-items:center;gap:6px;color:#475569;font-size:13px;font-weight:600;">
<select id="langSelect" onchange="switchLang(this.value)" style="padding:4px 8px;border-radius:4px;border:1px solid #e2e8f0;background:#fff;color:#475569;font-size:13px;">
<option value="zh">中文</option>
<option value="en">English</option>
</select>
</div>
<div class="admin-badge"><i class="fas fa-user-shield"></i>欢迎，<span th:text="${adminName}"></span></div>
<button class="logout-btn" onclick="location.href='/user/loginout'"><i class="fas fa-sign-out-alt"></i>退出</button>
</div>
</header>
<div class="content-body">
<div th:if="${msg != null}" class="toast-overlay">
<div class="toast-msg" th:classappend="${msg.contains('成功') || msg.contains('已') ? 'success' : 'error'}" id="toastMsg">
<i th:class="${msg.contains('成功') || msg.contains('已') ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'}"></i>
<span th:text="${msg}"></span>
</div>
</div>
<div class="panel">
<div class="panel-header">
<h2 class="panel-title">商品信息</h2>
</div>
<form class="form-wrap" th:action="@{/admin/updateGoods}" method="post" enctype="multipart/form-data">
<input type="hidden" name="id" th:value="${goods.id}">
<div class="form-grid">
<div class="form-group"><label>名称 *</label><input type="text" name="name" th:value="${goods.name}" required></div>
<div class="form-group"><label>价格 *</label><input type="text" name="price" th:value="${goods.price}" required></div>
<div class="form-group"><label>库存</label><input type="number" name="stock" th:value="${goods.stock}" required></div>
<div class="form-group"><label>分类</label><select name="type_id" id="typeSelect"><option value="">请选择分类</option><option th:each="t : ${typeList}" th:value="${t.id}" th:text="${t.name}"></option></select><input type="hidden" id="currentTypeId" th:value="${goods.type_id}"></div>

<div class="form-group">
<label>封面图片</label>
<input type="hidden" name="cover" th:value="${goods.cover}" id="coverInput">
<div class="image-upload-container">
<div class="image-preview" id="coverPreview" th:classappend="${goods.cover == null || goods.cover.isEmpty() ? 'empty' : ''}">
<img th:if="${goods.cover != null && !goods.cover.isEmpty()}" th:src="@{${goods.cover}}" alt="封面图片">
<div th:if="${goods.cover == null || goods.cover.isEmpty()}" class="text-center">
<i class="fas fa-image"></i>
<div>上传封面</div>
</div>
</div>
<label class="upload-btn">
<i class="fas fa-upload"></i>选择图片
<input type="file" name="coverFile" accept="image/*" onchange="uploadImage(this, 'cover')">
</label>
</div>
</div>

<div class="form-group">
<label>详情图1</label>
<input type="hidden" name="image1" th:value="${goods.image1}" id="image1Input">
<div class="image-upload-container">
<div class="image-preview" id="image1Preview" th:classappend="${goods.image1 == null || goods.image1.isEmpty() ? 'empty' : ''}">
<img th:if="${goods.image1 != null && !goods.image1.isEmpty()}" th:src="@{${goods.image1}}" alt="详情图1">
<div th:if="${goods.image1 == null || goods.image1.isEmpty()}" class="text-center">
<i class="fas fa-image"></i>
<div>上传图片1</div>
</div>
</div>
<label class="upload-btn">
<i class="fas fa-upload"></i>选择图片
<input type="file" name="image1File" accept="image/*" onchange="uploadImage(this, 'image1')">
</label>
</div>
</div>

<div class="form-group">
<label>详情图2</label>
<input type="hidden" name="image2" th:value="${goods.image2}" id="image2Input">
<div class="image-upload-container">
<div class="image-preview" id="image2Preview" th:classappend="${goods.image2 == null || goods.image2.isEmpty() ? 'empty' : ''}">
<img th:if="${goods.image2 != null && !goods.image2.isEmpty()}" th:src="@{${goods.image2}}" alt="详情图2">
<div th:if="${goods.image2 == null || goods.image2.isEmpty()}" class="text-center">
<i class="fas fa-image"></i>
<div>上传图片2</div>
</div>
</div>
<label class="upload-btn">
<i class="fas fa-upload"></i>选择图片
<input type="file" name="image2File" accept="image/*" onchange="uploadImage(this, 'image2')">
</label>
</div>
</div>

<div class="form-row-full form-group"><label>介绍</label><textarea name="intro" th:text="${goods.intro}"></textarea></div>
</div>
<div class="form-actions">
<button type="button" class="btn btn-light" onclick="location.href='/admin/goodsList'"><i class="fas fa-arrow-left"></i>返回</button>
<button type="submit" class="btn btn-primary"><i class="fas fa-save"></i>保存修改</button>
</div>
</form>
</div>
</div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
<script>
(function(){
var m=document.getElementById('toastMsg');
if(m)setTimeout(function(){m.parentElement.remove()},3000);
document.querySelectorAll('.sidebar .menu-item>li>a').forEach(function(a){
a.addEventListener('click',function(e){
var li=a.parentElement,sub=li.querySelector('.submenu');
if(sub){e.preventDefault();li.classList.toggle('open')}})})

document.addEventListener('DOMContentLoaded', function() {
    var typeSelect = document.getElementById('typeSelect');
    var currentTypeId = document.getElementById('currentTypeId').value;
    if (typeSelect && currentTypeId && currentTypeId !== '') {
        for (var i = 0; i < typeSelect.options.length; i++) {
            if (typeSelect.options[i].value == currentTypeId) {
                typeSelect.selectedIndex = i;
                break;
            }
        }
    }
});
})();

function uploadImage(input, fieldName) {
var file = input.files[0];
if (!file) return;

var validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/jpg'];
if (!validTypes.includes(file.type)) {
alert('请选择有效的图片文件（JPG、PNG、GIF）');
return;
}

var maxSize = 5 * 1024 * 1024;
if (file.size > maxSize) {
alert('图片大小不能超过5MB');
return;
}

var preview = document.getElementById(fieldName + 'Preview');
var inputField = document.getElementById(fieldName + 'Input');

preview.innerHTML = '<div class="loading-overlay"><i class="fas fa-spinner"></i></div>';

var formData = new FormData();
formData.append('file', file);

fetch('/admin/uploadImage', {
method: 'POST',
body: formData
})
.then(response => response.json())
.then(data => {
if (data.success) {
inputField.value = data.path;
preview.innerHTML = '<img src="' + data.path + '" alt="' + fieldName + '">';
preview.classList.remove('empty');
} else {
alert(data.message || '上传失败');
preview.innerHTML = '<div class="text-center"><i class="fas fa-image"></i><div>上传失败</div></div>';
preview.classList.add('empty');
}
})
.catch(error => {
console.error('上传错误:', error);
alert('上传发生错误');
preview.innerHTML = '<div class="text-center"><i class="fas fa-image"></i><div>上传失败</div></div>';
preview.classList.add('empty');
});
}

function toggleTheme(){var body=document.body;var current=body.getAttribute('data-theme');var next=current==='dark'?'light':'dark';body.setAttribute('data-theme',next);localStorage.setItem('theme',next);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(next==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}else{icon.className='fas fa-sun';label.textContent='日间模式'}}
function switchLang(lang){var url=new URL(window.location.href);url.searchParams.set('lang',lang);window.location.href=url.toString()}
(function(){var theme=localStorage.getItem('theme')||'light';document.body.setAttribute('data-theme',theme);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(icon&&label){if(theme==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}else{icon.className='fas fa-sun';label.textContent='日间模式'}}})();
</script>
</body>
</html>
