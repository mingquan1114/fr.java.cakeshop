<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>编辑用户 - 蛋糕系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;min-height:100vh}
.admin-container{display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);color:#fff;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;z-index:100;box-shadow:2px 0 20px rgba(0,0,0,.1)}
.sidebar-header{padding:24px 20px;background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);text-align:center;font-size:18px;font-weight:700;letter-spacing:1px}
.sidebar .menu-item{list-style:none;padding:0;margin:8px 0}
.sidebar .menu-item>li{position:relative}
.sidebar .menu-item>li>a{display:flex;align-items:center;padding:13px 20px;color:#94a3b8;text-decoration:none;transition:all .25s ease;font-size:13.5px;font-weight:500;gap:10px}
.sidebar .menu-item>li>a:hover{background:rgba(255,255,255,.08);color:#e2e8f0;padding-left:24px}
.sidebar .menu-item>li>a i{width:18px;text-align:center;font-size:14px}
.sidebar .menu-item>li.active>a{background:rgba(59,130,246,.25);color:#fff;border-left:3px solid #3b82f6}
.sidebar .menu-item>li>a::after{content:'\f107';font-family:'Font Awesome 5 Free';font-weight:900;margin-left:auto;font-size:11px;transition:transform .3s ease}
.sidebar .menu-item>li:not(:has(.submenu))>a::after{display:none}
.sidebar .menu-item .submenu{display:none;background:rgba(0,0,0,.15);list-style:none}
.sidebar .menu-item>li.open .submenu{display:block}
.sidebar .menu-item>li.open>a::after{transform:rotate(180deg)}
.submenu li a{display:block;padding:11px 20px 11px 48px;color:#94a3b8;text-decoration:none;font-size:13px;transition:all .25s ease}
.submenu li a:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.submenu li a.active-sub{background:rgba(59,130,246,.2);color:#60a5fa;font-weight:600}
.menu-sep{padding:8px 20px 4px;font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.main-content{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.top-header{background:#fff;padding:14px 30px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0}
.top-header h1{font-size:18px;font-weight:700;color:#1e293b;margin:0}
.top-header h1 i{margin-right:8px;color:#3b82f6}
.header-right{display:flex;align-items:center;gap:20px}
.admin-badge{display:flex;align-items:center;gap:8px;background:#f1f5f9;padding:6px 14px;border-radius:20px;font-size:13px;color:#475569}
.admin-badge i{color:#3b82f6}.admin-badge span{font-weight:600;color:#1e293b}
.logout-btn{padding:7px 18px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px}
.logout-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(239,68,68,.3)}
.content-body{padding:24px 30px;flex:1}
.toast-overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;pointer-events:none}
.toast-msg{background:#1e293b;color:#fff;padding:16px 32px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 10px 40px rgba(0,0,0,.25);animation:fadeInOut 3s ease forwards;display:flex;align-items:center;gap:10px}

@keyframes fadeInOut{0%{opacity:0;transform:translateY(20px)}15%{opacity:1;transform:translateY(0)}85%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px)}}
.panel{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;border:1px solid #e2e8f0}
.panel-header{padding:18px 24px;border-bottom:1px solid #e2e8f0}
.panel-title{font-size:15px;font-weight:700;color:#1e293b;margin:0}
.form-wrap{padding:24px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:7px}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;transition:border-color .25s}
.form-group input:focus,.form-group select:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-group input:disabled{background:#f8fafc;color:#94a3b8}
.form-actions{display:flex;gap:12px;justify-content:flex-end;padding-top:20px;margin-top:8px;border-top:1px solid #e2e8f0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 24px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.3)}
.btn-light{background:#f1f5f9;color:#475569}.btn-light:hover{background:#e2e8f0}
@media(max-width:768px){.sidebar{width:100%;position:relative}.main-content{margin-left:0}.form-grid{grid-template-columns:1fr}}
:root{--bg:#f0f2f5;--text:#1e293b;-text-secondary:#64748b}
[data-theme="dark"]{--bg:#0f172a;--text:#e2e8f0;}
body[data-theme="dark"]{background:var(--bg);color:var(--text)}
.theme-toggle{background:#f1f5f9;color:#475569;border:none;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:6px}
.theme-toggle:hover{opacity:.8}
</style>
</head>
<body>
<div class="admin-container">
<aside class="sidebar">
<div class="sidebar-header"><i class="fas fa-birthday-cake"></i>蛋糕管理系统</div>
<div class="menu-sep">主菜单</div>
<ul class="menu-item">
<li th:class="${currentPage == 'index' ? 'active' : ''}"><a href="/admin/index"><i class="fas fa-tachometer-alt"></i>控制台</a></li>
<li th:class="${currentPage == 'userList' ? 'active open' : ''}"><a href="#"><i class="fas fa-users"></i>用户管理</a><ul class="submenu"><li><a href="/admin/userList" th:class="${currentPage == 'userList' ? 'active-sub' : ''}">用户列表</a></li></ul></li>
<li th:class="${currentPage == 'goodsList' || currentPage == 'addGoods' ? 'active open' : ''}"><a href="#"><i class="fas fa-boxes"></i>商品管理</a><ul class="submenu"><li><a href="/admin/goodsList" th:class="${currentPage == 'goodsList' ? 'active-sub' : ''}">商品列表</a></li><li><a href="/admin/addGoods" th:class="${currentPage == 'addGoods' ? 'active-sub' : ''}">新增商品</a></li></ul></li>
<li th:class="${currentPage == 'typeList' ? 'active open' : ''}"><a href="#"><i class="fas fa-tags"></i>分类管理</a><ul class="submenu"><li><a href="/admin/typeList" th:class="${currentPage == 'typeList' ? 'active-sub' : ''}">分类列表</a></li></ul></li>
<li th:class="${currentPage == 'orderList' ? 'active open' : ''}"><a href="#"><i class="fas fa-shopping-cart"></i>订单管理</a><ul class="submenu"><li><a href="/admin/orderList" th:class="${currentPage == 'orderList' ? 'active-sub' : ''}">所有订单</a></li></ul></li>
<li th:class="${currentPage == 'adminSetting' || currentPage == 'logList' ? 'active open' : ''}"><a href="/admin/adminSetting"><i class="fas fa-cogs"></i>系统管理</a><ul class="submenu"><li><a href="/admin/adminSetting" th:class="${currentPage == 'adminSetting' ? 'active-sub' : ''}">管理员设置</a></li><li><a href="/admin/logList" th:class="${currentPage == 'logList' ? 'active-sub' : ''}">日志管理</a></li></ul></li>
</ul>
</aside>

<main class="main-content">
<header class="top-header">
<h1><i class="fas fa-user-edit"></i>编辑用户</h1>
<div class="header-right">
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i><span id="themeLabel">日间模式</span></button>
<div class="lang-switch" style="display:inline-flex;align-items:center;gap:6px;color:#475569;font-size:13px;font-weight:600;">
<select id="langSelect" onchange="switchLang(this.value)" style="padding:4px 8px;border-radius:4px;border:1px solid #e2e8f0;background:#fff;color:#475569;font-size:13px;">
<option value="zh">中文</option>
<option value="en">English</option>
</select>
</div>
<div class="admin-badge"><i class="fas fa-user-shield"></i>欢迎，<span th:text="${adminName}"></span></div>
<button class="logout-btn" onclick="location.href='/user/loginout'"><i class="fas fa-sign-out-alt"></i>退出</button>
</div>
</header>

<div class="content-body">
<div th:if="${msg != null}" class="toast-overlay">
<div class="toast-msg" th:classappend="${msg.contains('成功') || msg.contains('已') || msg.contains('通过') ? 'success' : 'error'}" id="toastMsg">
<i th:class="${msg.contains('成功') || msg.contains('已') || msg.contains('通过') ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'}"></i><span th:text="${msg}"></span>
</div></div>

<div class="panel">
<div class="panel-header"><h2 class="panel-title">用户信息</h2></div>
<form class="form-wrap" th:action="@{/admin/updateUser}" method="post">
<input type="hidden" name="id" th:value="${editUser.id}">
<div class="form-grid">
<div class="form-group"><label>用户名</label><input type="text" th:value="${editUser.username}" disabled></div>
<div class="form-group"><label>邮箱</label><input type="text" name="email" th:value="${editUser.email}"></div>
<div class="form-group"><label>真实姓名</label><input type="text" name="name" th:value="${editUser.name}"></div>
<div class="form-group"><label>联系电话</label><input type="text" name="phone" th:value="${editUser.phone}"></div>
<div class="form-group"><label>收货地址</label><input type="text" name="address" th:value="${editUser.address}"></div>
<div class="form-group"><label>审核状态</label><select name="isvalidate"><option value="1" th:selected="${editUser.isvalidate == '1' || editUser.isvalidate == 1}">已审核</option><option value="0" th:selected="${editUser.isvalidate == '0' || editUser.isvalidate == 0}">待审核</option></select></div>
</div>
<div class="form-actions">
<button type="button" class="btn btn-light" onclick="location.href='/admin/userList'"><i class="fas fa-arrow-left"></i>返回</button>
<button type="submit" class="btn btn-primary"><i class="fas fa-save"></i>保存修改</button>
</div>
</form>
</div>
</div>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
<script>
(function(){var m=document.getElementById('toastMsg');if(m)setTimeout(function(){m.parentElement.remove()},3000);document.querySelectorAll('.sidebar .menu-item>li>a').forEach(function(a){a.addEventListener('click',function(e){var li=a.parentElement,sub=li.querySelector('.submenu');if(sub){e.preventDefault();li.classList.toggle('open')}})})();
function toggleTheme(){var body=document.body;var current=body.getAttribute('data-theme');var next=current==='dark'?'light':'dark';body.setAttribute('data-theme',next);localStorage.setItem('theme',next);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(next==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}else{icon.className='fas fa-sun';label.textContent='日间模式'}}
function switchLang(lang){var url=new URL(window.location.href);url.searchParams.set('lang',lang);window.location.href=url.toString()}
(function(){var theme=localStorage.getItem('theme')||'light';document.body.setAttribute('data-theme',theme);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(icon&&label){if(theme==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}else{icon.className='fas fa-sun';label.textContent='日间模式'}}})();
</script>
</body>
</html>
