<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>订单管理 - 蛋糕系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link rel="stylesheet" href="/css/theme.css">
<style>
        .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
        .search-box{display:flex;gap:8px}
        .search-box input{padding:9px 14px;border:1px solid var(--color-border);border-radius:8px;font-size:13px;width:200px;outline:none;transition:border-color .25s;background:var(--bg-secondary);color:var(--color-text)}
        .search-box input:focus{border-color:var(--color-accent);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
        .search-box input::placeholder{color:var(--color-text-light)}
        .filter-bar{padding:14px 24px;background:var(--bg-secondary);border-bottom:1px solid var(--color-border);display:flex;align-items:center;gap:10px}
        .filter-bar label{font-size:12.5px;color:var(--color-text-secondary);font-weight:600}
        .filter-bar select{padding:7px 12px;border:1px solid var(--color-border);border-radius:6px;font-size:12.5px;outline:none;background:var(--bg-secondary);color:var(--color-text)}
        .btn-slate{background:var(--color-text-secondary);color:#fff}.btn-slate:hover{opacity:.85}
        .btn-orange{background:var(--color-warning);color:#1e293b}.btn-orange:hover{background:var(--color-warning-hover)}
        .btn-sm{padding:6px 12px;font-size:12px}
        .oid{font-family:'SF Mono',Consolas,monospace;color:var(--color-accent);font-size:12px}
        .total{color:var(--color-danger);font-weight:700;font-size:13.5px}
        .badge-green{background:#166534;color:#4ade80}
        .badge-blue{background:#1e40af;color:#60a5fa}
        .badge-slate{background:var(--bg-badge);color:var(--color-text-secondary)}
        .action-group{display:flex;gap:6px;flex-wrap:wrap}
        .action-group .btn{padding:6px 11px;font-size:11.5px;border-radius:5px}
    </style>
</head>
<body>

<div class="admin-container">
<aside class="sidebar">
<div class="sidebar-header"><i class="fas fa-birthday-cake"></i><span th:text="#{admin.sidebar.title}">蛋糕管理系统</span></div>
<div class="menu-sep" th:text="#{admin.sidebar.mainMenu}">主菜单</div>
<ul class="menu-item">
<li th:class="${currentPage == 'index' ? 'active' : ''}"><a href="/admin/index"><i class="fas fa-tachometer-alt"></i><span th:text="#{admin.sidebar.dashboard}">控制台</span></a></li>
<li th:class="${currentPage == 'userList' ? 'active open' : ''}"><a href="/admin/userList"><i class="fas fa-users"></i><span th:text="#{admin.sidebar.userManagement}">用户管理</span></a><ul class="submenu"><li><a href="/admin/userList" th:class="${currentPage == 'userList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.userList}">用户列表</span></a></li></ul></li>
<li th:class="${currentPage == 'goodsList' || currentPage == 'addGoods' ? 'active open' : ''}"><a href="/admin/goodsList"><i class="fas fa-boxes"></i><span th:text="#{admin.sidebar.goodsManagement}">商品管理</span></a><ul class="submenu"><li><a href="/admin/goodsList" th:class="${currentPage == 'goodsList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.goodsList}">商品列表</span></a></li><li><a href="/admin/addGoods" th:class="${currentPage == 'addGoods' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.addGoods}">新增商品</span></a></li></ul></li>
<li th:class="${currentPage == 'typeList' ? 'active open' : ''}"><a href="/admin/typeList"><i class="fas fa-tags"></i><span th:text="#{admin.sidebar.categoryManagement}">分类管理</span></a><ul class="submenu"><li><a href="/admin/typeList" th:class="${currentPage == 'typeList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.categoryList}">分类列表</span></a></li></ul></li>
<li th:class="${currentPage == 'orderList' ? 'active open' : ''}"><a href="/admin/orderList"><i class="fas fa-shopping-cart"></i><span th:text="#{admin.sidebar.orderManagement}">订单管理</span></a><ul class="submenu"><li><a href="/admin/orderList" th:class="${currentPage == 'orderList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.orderList}">所有订单</span></a></li></ul></li>
<li th:class="${currentPage == 'adminSetting' || currentPage == 'logList' ? 'active open' : ''}"><a href="/admin/adminSetting"><i class="fas fa-cogs"></i><span th:text="#{admin.sidebar.systemManagement}">系统管理</span></a><ul class="submenu"><li><a href="/admin/adminSetting" th:class="${currentPage == 'adminSetting' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.adminSetting}">管理员设置</span></a></li><li><a href="/admin/logList" th:class="${currentPage == 'logList' ? 'active-sub' : ''}"><span th:text="#{admin.sidebar.logManagement}">日志管理</span></a></li></ul></li>
</ul>
</aside>

<main class="main-content">
<header class="top-header">
<h1><i class="fas fa-shopping-cart"></i><span th:text="#{admin.order.list.title}">订单管理</span></h1>
<div class="header-right">
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i><span id="themeLabel" th:text="#{admin.theme.light}">日间模式</span></button>
<div class="lang-switch">
<select id="langSelect" onchange="switchLang(this.value)">
<option value="zh" th:text="#{admin.lang.zh}" th:selected="${#locale.language == 'zh'}">中文</option>
            <option value="en" th:text="#{admin.lang.en}" th:selected="${#locale.language == 'en'}">English</option>
            <option value="ja" th:text="#{admin.lang.ja}" th:selected="${#locale.language == 'ja'}">日本語</option>
</select>
</div>
<div class="admin-badge"><i class="fas fa-user-shield"></i><span th:text="#{admin.welcome}">欢迎</span>，<span th:text="${adminName}"></span></div>
<button class="logout-btn" onclick="location.href='/user/loginout'"><i class="fas fa-sign-out-alt"></i><span th:text="#{admin.logout}">退出</span></button>
</div>
</header>

<div class="content-body">
<div th:if="${msg != null}" class="toast-overlay">
<div class="toast-msg" th:classappend="${msg.contains('成功') || msg.contains('已') ? 'success' : 'error'}" id="toastMsg">
<i th:class="${msg.contains('成功') || msg.contains('已') ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'}"></i>
<span th:text="${msg}"></span>
</div>
</div>

<div class="panel">
<div class="panel-header">
<h2 class="panel-title" th:text="#{admin.order.list.title}">所有订单 <span class="badge-count" th:text="${totalOrders}">0</span></h2>
<div class="toolbar">
<form class="search-box" th:action="@{/admin/orderList}" method="get">
<input type="hidden" name="status" th:value="${status}">
<input type="text" name="keyword" th:value="${keyword}" th:placeholder="#{admin.order.search.placeholder}">
<button class="btn btn-blue"><i class="fas fa-search"></i><span th:text="#{common.search}">搜索</span></button>
</form>
</div>
</div>

<form class="filter-bar" th:action="@{/admin/orderList}" method="get" id="filterForm">
<label th:text="#{admin.order.filter.status}">状态筛选：</label>
<select name="status" onchange="document.getElementById('filterForm').submit()">
<option value="0" th:selected="${status == 0}" th:text="#{admin.order.filter.all}">全部</option>
<option value="2" th:selected="${status == 2}" th:text="#{admin.order.filter.unshipped}">未发货</option>
<option value="3" th:selected="${status == 3}" th:text="#{admin.order.filter.shipped}">已发货</option>
<option value="4" th:selected="${status == 4}" th:text="#{admin.order.filter.completed}">已完成</option>
</select>
<input type="hidden" name="keyword" th:value="${keyword}">
<input type="hidden" name="page" th:value="${page}">
</form>

<div class="table-wrap">
<table class="data-table">
<thead>
<tr><th th:text="#{admin.order.id}">订单编号</th><th th:text="#{admin.order.name}">收货人</th><th th:text="#{admin.order.phone}">电话</th><th th:text="#{admin.order.address}">地址</th><th th:text="#{admin.order.total}">金额</th><th th:text="#{admin.order.amount}">数量</th><th th:text="#{admin.order.status}">状态</th><th th:text="#{admin.order.datetime}">时间</th><th th:text="#{common.actions}">操作</th></tr>
</thead>
<tbody>
<tr th:each="o : ${orderList}">
<td class="oid" th:text="${o.id}"></td>
<td th:text="${o.nameDisplay != null ? o.nameDisplay : o.name}"></td>
<td th:text="${o.phone}"></td>
<td th:text="${o.addressDisplay != null ? o.addressDisplay : o.address}"></td>
<td class="total">¥<span th:text="${o.total}"></span></td>
<td th:text="${o.amount}"></td>
<td><span class="badge" th:class="${o.status == 2 ? 'badge-green' : (o.status == 3 ? 'badge-blue' : 'badge-slate')}" th:text="${o.statusDisplay}"></span></td>
<td th:text="${o.datetime}"></td>
<td>
<div class="action-group">
<a class="btn btn-blue btn-sm" th:href="@{/admin/orderDetail(id=${o.id})}"><i class="fas fa-eye"></i><span th:text="#{admin.order.detail}">查看详情</span></a>
<a th:if="${o.status == 2}" class="btn btn-green btn-sm" th:href="@{/admin/shipOrder(orderId=${o.id}, page=${page}, keyword=${keyword}, status=${status})}" th:attr="data-confirm=#{admin.order.ship.confirm}" onclick="return confirm(this.getAttribute('data-confirm'))"><i class="fas fa-truck"></i><span th:text="#{admin.order.ship}">发货</span></a>
<a th:if="${o.status == 3}" class="btn btn-orange btn-sm" th:href="@{/admin/completeOrder(orderId=${o.id}, page=${page}, keyword=${keyword}, status=${status})}" th:attr="data-confirm=#{admin.order.complete.confirm}" onclick="return confirm(this.getAttribute('data-confirm'))"><i class="fas fa-check-circle"></i><span th:text="#{admin.order.complete}">完成</span></a>
</div>
</td>
</tr>
</tbody>
</table>
</div>

<div th:if="${orderList == null || orderList.isEmpty()}" class="empty-state">
<i class="fas fa-inbox"></i><span th:text="#{admin.order.no.data}">暂无订单数据</span>
</div>

<div th:if="${totalPages > 1}" class="pagination">
<a th:href="@{/admin/orderList(page=${page - 1}, keyword=${keyword}, status=${status})}" class="page-item" th:classappend="${page <= 1 ? 'disabled' : ''}"><i class="fas fa-chevron-left"></i></a>
<span class="page-info">第 [[${page}]] 页 / 共 [[${totalPages}]] 页</span>
<a th:href="@{/admin/orderList(page=${page + 1}, keyword=${keyword}, status=${status})}" class="page-item" th:classappend="${page >= totalPages ? 'disabled' : ''}"><i class="fas fa-chevron-right"></i></a>
</div>

</div>
</div>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var m = document.getElementById('toastMsg');
    if(m) setTimeout(function(){m.parentElement.remove()}, 3000);
});
function toggleTheme(){var body=document.body;var current=body.getAttribute('data-theme');var next=current==='dark'?'light':'dark';body.setAttribute('data-theme',next);localStorage.setItem('theme',next);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(next==='dark'){icon.className='fas fa-moon';label.textContent='\u591c\u95f4\u6a21\u5f0f'}else{icon.className='fas fa-sun';label.textContent='\u65e5\u95f4\u6a21\u5f0f'}}
function switchLang(lang){var url=new URL(window.location.href);url.searchParams.set('lang',lang);window.location.href=url.toString()}
(function(){var theme=localStorage.getItem('theme')||'light';document.body.setAttribute('data-theme',theme);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(icon&&label){if(theme==='dark'){icon.className='fas fa-moon';label.textContent='\u591c\u95f4\u6a21\u5f0f'}else{icon.className='fas fa-sun';label.textContent='\u65e5\u95f4\u6a21\u5f0f'}}})();
</script>
</body>
</html>
