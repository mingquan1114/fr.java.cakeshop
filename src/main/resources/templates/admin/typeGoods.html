<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>分类商品 - 蛋糕系统</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;min-height:100vh}.admin-container{display:flex;min-height:100vh}.sidebar{width:230px;background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);color:#fff;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;z-index:100;box-shadow:2px 0 20px rgba(0,0,0,.1)}.sidebar-header{padding:24px 20px;background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);text-align:center;font-size:18px;font-weight:700;letter-spacing:1px}.sidebar .menu-item{list-style:none;padding:0;margin:8px 0}.sidebar .menu-item>li{position:relative}.sidebar .menu-item>li>a{display:flex;align-items:center;padding:13px 20px;color:#94a3b8;text-decoration:none;transition:all .25s ease;font-size:13.5px;font-weight:500;gap:10px}.sidebar .menu-item>li>a i{width:18px;text-align:center;font-size:14px}.sidebar .menu-item>li>a:hover{background:rgba(255,255,255,.08);color:#e2e8f0;padding-left:24px}.sidebar .menu-item>li.active>a{background:rgba(59,130,246,.25);color:#fff;border-left:3px solid #3b82f6}.sidebar .menu-item>li>a::after{content:'\f107';font-family:'Font Awesome 5 Free';font-weight:900;margin-left:auto;font-size:11px;transition:transform .3s ease}.sidebar .menu-item>li:not(:has(.submenu))>a::after{display:none}.sidebar .menu-item .submenu{display:none;background:rgba(0,0,0,.15);list-style:none}.sidebar .menu-item>li.open .submenu{display:block}.sidebar .menu-item>li.open>a::after{transform:rotate(180deg)}.submenu li a{display:block;padding:11px 20px 11px 48px;color:#94a3b8;text-decoration:none;font-size:13px;transition:all .25s ease}.submenu li a:hover{background:rgba(255,255,255,.06);color:#e2e8f0}.submenu li a.active-sub{background:rgba(59,130,246,.2);color:#60a5fa;font-weight:600}.menu-sep{padding:8px 20px 4px;font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}.main-content{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}.top-header{background:#fff;padding:14px 30px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0}.top-header h1{font-size:18px;font-weight:700;color:#1e293b;margin:0}.top-header h1 i{margin-right:8px;color:#3b82f6}.header-right{display:flex;align-items:center;gap:20px}.admin-badge{display:flex;align-items:center;gap:8px;background:#f1f5f9;padding:6px 14px;border-radius:20px;font-size:13px;color:#475569}.admin-badge i{color:#3b82f6}.admin-badge span{font-weight:600;color:#1e293b}.logout-btn{padding:7px 18px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px}.logout-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(239,68,68,.3)}.content-body{padding:24px 30px;flex:1}.panel{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;border:1px solid #e2e8f0}.panel-header{padding:18px 24px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}.panel-title{font-size:15px;font-weight:700;color:#1e293b;margin:0}.badge-count{background:#3b82f6;color:#fff;padding:2px 10px;border-radius:12px;font-size:12px}.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border:none;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .25s}.btn-light{background:#f1f5f9;color:#475569}.btn-light:hover{background:#e2e8f0}.table-wrap{overflow-x:auto}.data-table{width:100%;border-collapse:collapse;font-size:13px}.data-table th,.data-table td{padding:12px 16px;text-align:left;border-bottom:1px solid #f1f5f9}.data-table th{background:#f8fafc;font-weight:700;color:#475569;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px}.data-table tbody tr:hover{background:#f8fafc}.prod-img{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0}.price-tag{color:#ef4444;font-weight:700;font-size:14px}.empty-state{text-align:center;padding:48px;color:#94a3b8}.empty-state i{font-size:40px;margin-bottom:12px;display:block}@media(max-width:768px){.sidebar{width:100%;position:relative}.main-content{margin-left:0}}:root{--bg:#f0f2f5;--text:#1e293b;-text-secondary:#64748b}[data-theme="dark"]{--bg:#0f172a;--text:#e2e8f0;}body[data-theme="dark"]{background:var(--bg);color:var(--text)}.theme-toggle{background:#f1f5f9;color:#475569;border:none;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:6px}.theme-toggle:hover{opacity:.8}</style></head><body>
<div class="admin-container"><aside class="sidebar"><div class="sidebar-header"><i class="fas fa-birthday-cake"></i>蛋糕管理系统</div><div class="menu-sep">主菜单</div><ul class="menu-item"><li th:class="${currentPage == 'index' ? 'active' : ''}"><a href="/admin/index"><i class="fas fa-tachometer-alt"></i>控制台</a></li><li th:class="${currentPage == 'userList' ? 'active open' : ''}"><a href="#"><i class="fas fa-users"></i>用户管理</a><ul class="submenu"><li><a href="/admin/userList" th:class="${currentPage == 'userList' ? 'active-sub' : ''}">用户列表</a></li></ul></li><li th:class="${currentPage == 'goodsList' || currentPage == 'addGoods' ? 'active open' : ''}"><a href="#"><i class="fas fa-boxes"></i>商品管理</a><ul class="submenu"><li><a href="/admin/goodsList" th:class="${currentPage == 'goodsList' ? 'active-sub' : ''}">商品列表</a></li><li><a href="/admin/addGoods" th:class="${currentPage == 'addGoods' ? 'active-sub' : ''}">新增商品</a></li></ul></li><li th:class="${currentPage == 'typeList' ? 'active open' : ''}"><a href="#"><i class="fas fa-tags"></i>分类管理</a><ul class="submenu"><li><a href="/admin/typeList" th:class="${currentPage == 'typeList' ? 'active-sub' : ''}">分类列表</a></li></ul></li><li th:class="${currentPage == 'orderList' ? 'active open' : ''}"><a href="#"><i class="fas fa-shopping-cart"></i>订单管理</a><ul class="submenu"><li><a href="/admin/orderList" th:class="${currentPage == 'orderList' ? 'active-sub' : ''}">所有订单</a></li></ul></li><li th:class="${currentPage == 'adminSetting' || currentPage == 'logList' ? 'active open' : ''}"><a href="/admin/adminSetting"><i class="fas fa-cogs"></i>系统管理</a><ul class="submenu"><li><a href="/admin/adminSetting" th:class="${currentPage == 'adminSetting' ? 'active-sub' : ''}">管理员设置</a></li><li><a href="/admin/logList" th:class="${currentPage == 'logList' ? 'active-sub' : ''}">日志管理</a></li></ul></li></ul></aside>
<main class="main-content"><header class="top-header"><h1><i class="fas fa-tag"></i>分类商品</h1><div class="header-right"><button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i><span id="themeLabel">日间模式</span></button><div class="lang-switch" style="display:inline-flex;align-items:center;gap:6px;color:#475569;font-size:13px;font-weight:600;"><select id="langSelect" onchange="switchLang(this.value)" style="padding:4px 8px;border-radius:4px;border:1px solid #e2e8f0;background:#fff;color:#475569;font-size:13px;"><option value="zh">中文</option><option value="en">English</option></select></div><div class="admin-badge"><i class="fas fa-user-shield"></i>欢迎，<span th:text="${adminName}"></span></div><button class="logout-btn" onclick="location.href='/user/loginout'"><i class="fas fa-sign-out-alt"></i>退出</button></div></header>
<div class="content-body">
<div class="panel"><div class="panel-header"><h2 class="panel-title">「<strong th:text="${type != null ? type.name : ''}"></strong>」分类商品 <span class="badge-count" th:text="${goodsList != null ? goodsList.size() : 0}">0</span></h2><button class="btn btn-light" onclick="location.href='/admin/typeList'"><i class="fas fa-arrow-left"></i>返回分类列表</button></div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>ID</th><th>图片</th><th>名称</th><th>价格</th><th>库存</th></tr></thead><tbody>
<tr th:each="g : ${goodsList}">
<td th:text="${g.id}"></td>
<td><img th:src="@{${g.cover}}" class="prod-img" onerror="this.style.display='none'"></td>
<td><strong th:text="${g.name}"></strong></td>
<td class="price-tag">¥<span th:text="${g.price}"></span></td>
<td th:text="${g.stock}"></td>
</tr>
</tbody></table></div>
<div th:if="${goodsList == null || goodsList.isEmpty()}" class="empty-state"><i class="fas fa-box-open"></i>该分类下暂无商品</div>
</div>
</div></main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
<script>(function(){document.querySelectorAll('.sidebar .menu-item>li>a').forEach(function(a){a.addEventListener('click',function(e){var li=a.parentElement,sub=li.querySelector('.submenu');if(sub){e.preventDefault();li.classList.toggle('open')}})})();
function toggleTheme(){var body=document.body;var current=body.getAttribute('data-theme');var next=current==='dark'?'light':'dark';body.setAttribute('data-theme',next);localStorage.setItem('theme',next);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(next==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}else{icon.className='fas fa-sun';label.textContent='日间模式'}}function switchLang(lang){var url=new URL(window.location.href);url.searchParams.set('lang',lang);window.location.href=url.toString()}(function(){var theme=localStorage.getItem('theme')||'light';document.body.setAttribute('data-theme',theme);var icon=document.getElementById('themeIcon');var label=document.getElementById('themeLabel');if(icon&&label){if(theme==='dark'){icon.className='fas fa-moon';label.textContent='夜间模式'}else{icon.className='fas fa-sun';label.textContent='日间模式'}}})();</script></body></html>
