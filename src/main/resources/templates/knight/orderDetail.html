<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑士端 - 订单详情</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/knight.css">
    <style>
        .header {
            justify-content: flex-start;
            gap: var(--spacing-lg);
        }
        
        .goods-item {
            display: flex;
            gap: var(--spacing-lg);
            padding: var(--spacing-lg) 0;
            border-bottom: 1px solid var(--border-light);
            align-items: center;
        }
        
        .goods-item:last-child {
            border-bottom: none;
        }
        
        .goods-img {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background: rgba(255, 140, 66, 0.1);
            flex-shrink: 0;
        }
        
        .goods-info {
            flex: 1;
            min-width: 0;
        }
        
        .goods-name {
            font-size: var(--font-md);
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .goods-price {
            font-size: var(--font-sm);
            color: var(--text-muted);
        }
        
        .goods-amount {
            font-size: var(--font-md);
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-lg) 0 0;
            font-size: var(--font-lg);
            font-weight: 700;
            border-top: 1px solid var(--border-color);
            margin-top: var(--spacing-sm);
        }
        
        .total-row .price {
            color: var(--primary-color);
            font-size: var(--font-xl);
        }
        
        .delivery-info {
            background: linear-gradient(135deg, rgba(255, 140, 66, 0.08), rgba(255, 107, 53, 0.04));
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-top: var(--spacing-lg);
            border: 1px solid rgba(255, 140, 66, 0.15);
        }
        
        .delivery-info .title {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: var(--spacing-md);
        }
        
        .delivery-info .fee {
            font-size: var(--font-2xl);
            font-weight: 700;
            color: var(--color-green);
        }
    </style>
</head>
<body>
    <div class="header">
        <a th:href="@{/knight/index}" class="back"><i class="fas fa-arrow-left"></i></a>
        <h1>订单详情</h1>
    </div>

    <div class="section">
        <div class="section-title"><i class="fas fa-info-circle"></i>订单信息</div>
        <div class="info-row">
            <span class="label">订单编号</span>
            <span class="value" style="font-family: 'Monaco', 'Menlo', monospace;" th:text="${order.id}"></span>
        </div>
        <div class="info-row">
            <span class="label">订单状态</span>
            <span class="value">
                <span th:if="${order.status == 2}" class="status-badge status-2">待接单</span>
                <span th:if="${order.status == 3}" class="status-badge status-3">待取货</span>
                <span th:if="${order.status == 4}" class="status-badge status-4">配送中</span>
                <span th:if="${order.status == 5}" class="status-badge status-5">已完成</span>
            </span>
        </div>
        <div class="info-row">
            <span class="label">创建时间</span>
            <span class="value" th:text="${order.datetime}"></span>
        </div>
        <div th:if="${order.pickupTime != null}" class="info-row">
            <span class="label">取货时间</span>
            <span class="value" th:text="${order.pickupTime}"></span>
        </div>
        <div th:if="${order.deliveryTime != null}" class="info-row">
            <span class="label">送达时间</span>
            <span class="value" th:text="${order.deliveryTime}"></span>
        </div>
        <div class="delivery-info">
            <div class="title">配送费收入</div>
            <div class="fee">¥<span th:text="${#numbers.formatDecimal(order.deliveryFee, 0, 'COMMA', 2, 'POINT')}"></span></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title"><i class="fas fa-box"></i>商品明细</div>
        <th:block th:each="detail : ${orderDetails}">
            <div class="goods-item">
                <img class="goods-img" th:src="@{${detail.goodsCover}}" th:alt="${detail.goodsName}">
                <div class="goods-info">
                    <div class="goods-name" th:text="${detail.goodsName}"></div>
                    <div class="goods-price">¥<span th:text="${detail.price}"></span></div>
                </div>
                <div class="goods-amount">x<span th:text="${detail.amount}"></span></div>
            </div>
        </th:block>
        <div class="total-row">
            <span>订单金额</span>
            <span class="price">¥<span th:text="${order.total}"></span></span>
        </div>
    </div>

    <div class="section">
        <div class="section-title"><i class="fas fa-map-marker-alt"></i>收货信息</div>
        <div class="info-row">
            <span class="label">收货人</span>
            <span class="value" th:text="${order.name}"></span>
        </div>
        <div class="info-row">
            <span class="label">联系电话</span>
            <span class="value" th:text="${order.phone}"></span>
        </div>
        <div class="info-row" style="align-items: flex-start;">
            <span class="label" style="flex-shrink: 0;">收货地址</span>
            <span class="value" style="text-align: right; max-width: 70%;" th:text="${order.address}"></span>
        </div>
    </div>

    <div class="bottom-nav">
        <a th:href="@{/knight/index}" class="nav-item">
            <i class="fas fa-home"></i><span>首页</span>
        </a>
        <a th:href="@{/knight/income}" class="nav-item">
            <i class="fas fa-coins"></i><span>收入</span>
        </a>
        <a th:href="@{/knight/message}" class="nav-item">
            <i class="fas fa-bell"></i><span>消息</span>
        </a>
        <a th:href="@{/knight/profile}" class="nav-item">
            <i class="fas fa-user"></i><span>我的</span>
        </a>
    </div>
</body>
</html>
