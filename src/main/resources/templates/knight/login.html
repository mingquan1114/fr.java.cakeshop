<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑士端 - 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff8f0 0%, #ffedd5 50%, #ffe4c4 100%);
            overflow: hidden;
        }
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 12s infinite ease-in-out;
        }
        .c1 { width: 400px; height: 400px; background: #ff8c42; top: -150px; left: -100px; }
        .c2 { width: 350px; height: 350px; background: #ff6b35; bottom: -100px; right: -80px; animation-delay: -4s; }
        .c3 { width: 300px; height: 300px; background: #ffaa00; top: 50%; left: 60%; animation-delay: -8s; }
        @keyframes float {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }
        .login-box {
            background: #fff;
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 50px 40px;
            width: 380px;
            z-index: 1;
            box-shadow: 0 30px 60px rgba(255, 107, 53, 0.2);
            border: 1px solid rgba(255, 140, 66, 0.15);
        }
        .logo { text-align: center; margin-bottom: 35px; }
        .logo-icon {
            width: 80px; height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #ff8c42, #ff6b35);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px; color: #fff;
            box-shadow: 0 15px 35px rgba(255, 140, 66, 0.4);
        }
        .logo h1 { font-size: 26px; color: #333; font-weight: 700; }
        .logo p { color: #888; font-size: 13px; margin-top: 6px; }
        .field { margin-bottom: 22px; }
        .field label { display: block; color: #666; font-size: 13px; margin-bottom: 8px; font-weight: 600; }
        .input-wrap { position: relative; }
        .input-wrap input {
            width: 100%; padding: 14px 16px 14px 44px;
            background: rgba(255, 140, 66, 0.06);
            border: 1.5px solid rgba(255, 140, 66, 0.2);
            border-radius: 14px; color: #333; font-size: 15px;
            transition: all 0.3s;
        }
        .input-wrap input:focus {
            outline: none; border-color: #ff6b35;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.15);
        }
        .input-wrap input::placeholder { color: #bbb; }
        .input-wrap .icon {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); color: #ff8c42;
            font-size: 16px;
        }
        .btn-login {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #ff8c42, #ff6b35);
            border: none; border-radius: 14px;
            color: #fff; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.35);
            margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(255, 107, 53, 0.45); }
        .error-msg {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
            border-radius: 12px; padding: 12px;
            text-align: center; color: #ff6b6b;
            font-size: 13px; margin-bottom: 20px;
        }
        .switch-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 140, 66, 0.1);
        }
        .switch-link a {
            color: #ff6b35;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .switch-link a:hover {
            color: #ff8c42;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>

    <div class="login-box">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-motorcycle"></i></div>
            <h1>骑士端</h1>
            <p>配送管理系统</p>
        </div>

        <div th:if="${error}" class="error-msg" th:text="${error}"></div>

        <form th:action="@{/knight/doLogin}" method="post">
            <div class="field">
                <label>账号</label>
                <div class="input-wrap">
                    <input type="text" name="username" placeholder="请输入骑士账号" required autofocus>
                    <i class="icon fas fa-user"></i>
                </div>
            </div>
            <div class="field">
                <label>密码</label>
                <div class="input-wrap">
                    <input type="password" name="password" placeholder="请输入密码" required>
                    <i class="icon fas fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
        
        <div class="switch-link">
            <a th:href="@{/login}"><i class="fas fa-shopping-cart"></i> 切换到商城登录</a>
        </div>
    </div>
</body>
</html>
