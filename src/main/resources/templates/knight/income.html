<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑士端 - 收入统计</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/knight.css">
    <style>
        .income-overview {
            padding: var(--spacing-lg);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-md);
        }
        
        .income-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }
        
        .income-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .income-card .icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-lg);
            font-size: 20px;
            position: relative;
            z-index: 1;
        }
        
        .icon-today { 
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-color)); 
            color: #ffffff; 
        }
        .icon-week { 
            background: linear-gradient(135deg, var(--primary-color), #ff4500); 
            color: #ffffff; 
        }
        .icon-month { 
            background: linear-gradient(135deg, #ffb347, var(--primary-light)); 
            color: #ffffff; 
        }
        .icon-total { 
            background: linear-gradient(135deg, var(--secondary-color), #ff8c00); 
            color: #ffffff; 
        }
        
        .income-card .amount {
            font-size: var(--font-3xl);
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: var(--spacing-xs);
            position: relative;
            z-index: 1;
        }
        
        .income-card .label {
            font-size: var(--font-sm);
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }
        
        .income-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 140, 66, 0.05), transparent);
            border-radius: 50%;
            transition: transform var(--transition-slow);
        }
        
        .income-card:hover::after {
            transform: scale(2);
        }
        
        .total-section {
            margin: 0 var(--spacing-lg) var(--spacing-lg);
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-color) 100%);
            border-radius: var(--radius-2xl);
            padding: var(--spacing-2xl);
            text-align: center;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
        }
        
        .total-section::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        .total-section::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -20%;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }
        
        .total-section .label {
            font-size: var(--font-md);
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: var(--spacing-sm);
            display: block;
            position: relative;
            z-index: 1;
        }
        
        .total-section .amount {
            font-size: var(--font-6xl);
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-item .num {
            font-size: var(--font-xl);
            font-weight: 700;
            color: #ffffff;
        }
        
        .stat-item .text {
            font-size: var(--font-xs);
            color: rgba(255, 255, 255, 0.7);
            margin-top: var(--spacing-xs);
        }
        
        .section-title {
            padding: var(--spacing-lg) var(--spacing-lg) var(--spacing-sm);
            font-size: var(--font-md);
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .filter-tabs {
            display: flex;
            padding: 0 var(--spacing-lg);
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }
        
        .filter-tab {
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: 20px;
            font-size: var(--font-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            background: rgba(255, 140, 66, 0.1);
            color: var(--primary-color);
            font-weight: 500;
        }
        
        .filter-tab.active {
            background: linear-gradient(135deg, var(--primary-light), var(--primary-color));
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }
        
        .detail-list {
            padding: 0 var(--spacing-lg) calc(var(--spacing-xl) * 4);
        }
        
        .detail-item {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-sm);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition-normal);
        }
        
        .detail-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }
        
        .detail-item .info {
            flex: 1;
        }
        
        .detail-item .order-id {
            font-size: var(--font-base);
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .detail-item .time {
            font-size: var(--font-xs);
            color: var(--text-muted);
            margin-top: var(--spacing-xs);
        }
        
        .detail-item .amount {
            font-size: var(--font-lg);
            font-weight: 700;
            color: var(--color-green);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 收入统计</h1>
    </div>

    <div class="income-overview">
        <div class="income-card">
            <div class="icon icon-today"><i class="fas fa-sun"></i></div>
            <div class="amount">¥<span th:text="${#numbers.formatDecimal(todayIncome, 0, 'COMMA', 2, 'POINT')}">0.00</span></div>
            <div class="label">今日收入</div>
        </div>
        <div class="income-card">
            <div class="icon icon-week"><i class="fas fa-calendar-week"></i></div>
            <div class="amount">¥<span th:text="${#numbers.formatDecimal(weekIncome, 0, 'COMMA', 2, 'POINT')}">0.00</span></div>
            <div class="label">本周收入</div>
        </div>
        <div class="income-card">
            <div class="icon icon-month"><i class="fas fa-calendar"></i></div>
            <div class="amount">¥<span th:text="${#numbers.formatDecimal(monthIncome, 0, 'COMMA', 2, 'POINT')}">0.00</span></div>
            <div class="label">本月收入</div>
        </div>
        <div class="income-card">
            <div class="icon icon-total"><i class="fas fa-trophy"></i></div>
            <div class="amount">¥<span th:text="${#numbers.formatDecimal(totalIncome, 0, 'COMMA', 2, 'POINT')}">0.00</span></div>
            <div class="label">累计收入</div>
        </div>
    </div>

    <div class="total-section">
        <div class="label">📊 累计总收入</div>
        <div class="amount">¥<span th:text="${#numbers.formatDecimal(totalIncome, 0, 'COMMA', 2, 'POINT')}">0.00</span></div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="num" th:text="${orderCount}">0</div>
                <div class="text">配送订单</div>
            </div>
            <div class="stat-item">
                <div class="num" th:text="${avgOrder}">0</div>
                <div class="text">平均单量</div>
            </div>
            <div class="stat-item">
                <div class="num">¥<span th:text="${avgIncome}">0</span></div>
                <div class="text">平均收入</div>
            </div>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-history"></i>收入明细</div>
    <div class="filter-tabs">
        <div class="filter-tab active" onclick="filterOrders('all')">全部</div>
        <div class="filter-tab" onclick="filterOrders('today')">今日</div>
        <div class="filter-tab" onclick="filterOrders('week')">本周</div>
        <div class="filter-tab" onclick="filterOrders('month')">本月</div>
    </div>

    <div class="detail-list" id="orderList">
        <th:block th:if="${completedOrders != null && !completedOrders.isEmpty()}">
            <div th:each="order : ${completedOrders}" class="detail-item">
                <div class="info">
                    <div class="order-id">订单 #<span th:text="${order.id}"></span></div>
                    <div class="time" th:text="${order.deliveryTime}"></div>
                </div>
                <div class="amount">+¥<span th:text="${#numbers.formatDecimal(order.deliveryFee, 0, 'COMMA', 2, 'POINT')}"></span></div>
            </div>
        </th:block>
        <th:block th:else>
            <div class="empty-state">
                <i class="fas fa-receipt"></i>
                <p>暂无收入记录</p>
            </div>
        </th:block>
    </div>

    <div class="bottom-nav">
        <a th:href="@{/knight/index}" class="nav-item">
            <i class="fas fa-home"></i><span>首页</span>
        </a>
        <a th:href="@{/knight/income}" class="nav-item active">
            <i class="fas fa-coins"></i><span>收入</span>
        </a>
        <a th:href="@{/knight/message}" class="nav-item">
            <i class="fas fa-bell"></i><span>消息</span>
        </a>
        <a th:href="@{/knight/profile}" class="nav-item">
            <i class="fas fa-user"></i><span>我的</span>
        </a>
    </div>

    <script>
        function filterOrders(type) {
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
