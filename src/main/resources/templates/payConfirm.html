<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>支付中 - 蛋糕系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" rel="stylesheet" th:href="@{/css/main.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/zui.min.css}">
    <script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style type="text/css">
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow-x: hidden;
        }
        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .gradient-circle {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
            animation: float 15s infinite ease-in-out;
        }
        .circle-pink {
            width: 600px; height: 600px; background: radial-gradient(circle, #ff6b9d 0%, #c44569 100%);
            top: -250px; left: -150px;
        }
        .circle-blue {
            width: 500px; height: 500px; background: radial-gradient(circle, #4facfe 0%, #00f2fe 100%);
            bottom: -200px; right: -100px; animation-delay: -5s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }
        .main-content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 60px 20px;
        }
        .loading-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            padding: 50px 40px; text-align: center;
            max-width: 450px; width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .loading-icon {
            width: 120px; height: 120px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 40px rgba(79, 172, 254, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .spinner {
            font-size: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .loading-title {
            font-size: 28px; font-weight: 700; color: #fff;
            margin-bottom: 15px;
        }
        .loading-message {
            font-size: 16px; color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }
        .amount-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px; padding: 25px;
            margin-bottom: 30px;
        }
        .amount-label {
            font-size: 14px; color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }
        .amount-value {
            font-size: 36px; font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #4facfe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #4facfe);
            border-radius: 3px;
            animation: progress 2s ease-out forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .footer {
            position: relative; z-index: 10; text-align: center;
            padding: 30px; color: rgba(255, 255, 255, 0.4); font-size: 14px;
            background: rgba(0, 0, 0, 0.2); margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-circle circle-pink"></div>
        <div class="gradient-circle circle-blue"></div>
    </div>

    <div class="main-content">
        <div class="loading-card">
            <div class="loading-icon">
                <i class="fas fa-spinner spinner"></i>
            </div>
            <h1 class="loading-title">支付处理中</h1>
            <p class="loading-message">正在处理您的支付请求，请稍候...</p>
            
            <div class="amount-section">
                <div class="amount-label">支付金额</div>
                <div class="amount-value">¥[[${totalAmount}]]</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 蛋糕系统 - 用心烘焙每一份甜蜜</p>
    </div>

    <form id="paymentForm" action="/payment/confirm" method="post">
    </form>

    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                document.getElementById('paymentForm').submit();
            }, 2000);
        });
    </script>
</body>
</html>
