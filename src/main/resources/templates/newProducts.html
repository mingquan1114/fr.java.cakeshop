<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新品上市</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .gradient-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 15s infinite ease-in-out;
        }

        .circle-pink {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #ff6b9d 0%, #c44569 100%);
            top: -250px;
            left: -150px;
        }

        .circle-blue {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #4facfe 0%, #00f2fe 100%);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }

        nav {
            position: relative;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            font-size: 1.5em !important;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #4facfe, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-nav > li > a {
            color: rgba(255, 255, 255, 0.8) !important;
            transition: all 0.3s ease;
        }

        .navbar-nav > li > a:hover {
            color: #4facfe !important;
        }

        .main-content {
            position: relative;
            z-index: 10;
            padding: 60px 20px;
            min-height: calc(100vh - 100px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #00f2fe, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            text-align: center;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card::before {
            content: 'NEW';
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 10;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-intro {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #4facfe;
            margin-bottom: 15px;
        }

        .btn-add-cart {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
        }

        .empty-message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 28px;
            }
        }

        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .notification-popup {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 45px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .notification-popup::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 157, 0.1), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .notification-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .notification-icon.success {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
        }

        .notification-icon.error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .notification-title {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ff6b9d, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .notification-message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .notification-btn {
            padding: 14px 45px;
            border: none;
            border-radius: 35px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #ff6b9d 0%, #4facfe 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
        }

        .notification-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 157, 0.5);
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-circle circle-pink"></div>
        <div class="gradient-circle circle-blue"></div>
    </div>

    <div th:if="${msg != null}" class="notification-overlay" id="notificationOverlay">
        <div class="notification-popup">
            <div th:class="'notification-icon ' + (${msg.contains('成功')} ? 'success' : 'error')">
                <span th:text="${msg.contains('成功') ? '🎉' : '😢'}"></span>
            </div>
            <h3 class="notification-title" th:text="${msg.contains('成功') ? '添加成功' : '添加失败'}"></h3>
            <p class="notification-message" th:text="${msg.contains('成功') ? '🎉 恭喜！商品已成功加入购物车，快去看看吧~' : '😢 抱歉，该商品库存不足，请选择其他商品'}"></p>
            <button class="notification-btn" onclick="closeNotification()">好的</button>
        </div>
    </div>

    <nav class="navbar navbar-inverse" role="navigation">
        <div class="container-fluid" style="font-size:1.2em; padding-top:10px; padding-left:50px; padding-right:50px;">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse-example">
                    <span class="sr-only">切换导航</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" th:href="@{/goods/goodsList}">🍰 蛋糕系统</a>
            </div>
            <div class="collapse navbar-collapse navbar-collapse-example">
                <ul class="nav navbar-nav">
                    <li><a th:href="@{/goods/goodsList}">首页</a></li>
                    
                    <li class="dropdown">
                        <a href="#" class="dropdown-toggle" data-toggle="dropdown">商品分类 <b class="caret"></b></a>
                        <ul class="dropdown-menu" role="menu">
                            <th:block th:each="type : ${typeList}">
                                <li><a th:href="@{/goods/goodsList(typeid=${type.id})}" th:text="${type.name}"></a></li>
                            </th:block>
                        </ul>
                    </li>
                    
                    <li><a th:href="@{/goods/hotSales}">热销</a></li>
                    <li class="active"><a th:href="@{/goods/newProducts}">新品</a></li>
                    
                    <li><a th:href="@{/register}">注册</a></li>
                    <li><a th:href="@{/user/loginout}">退出登录</a></li>
                    <li><a th:href="@{/order/orderList}">我的订单</a></li>
                </ul>
                
                <ul class="nav navbar-nav navbar-right">
                    <li><a th:href="@{/cart/myCart}">
                        <i class="fas fa-shopping-cart" style="font-size:1.5em;"></i>
                        <span class="label label-badge label-success" style="margin-bottom:6px;" th:text="${count}"></span>
                    </a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <h1 class="page-title">✨ 新品上市</h1>

            <th:block th:if="${newProductsList != null && !newProductsList.isEmpty()}">
                <div class="products-grid">
                    <div th:each="product : ${newProductsList}" class="product-card">
                        <img th:src="@{${product.cover}}" th:alt="${product.name}" class="product-image">
                        <div class="product-info">
                            <div class="product-name" th:text="${product.name}"></div>
                            <div class="product-intro" th:text="${product.intro}"></div>
                            <div class="product-price">¥<span th:text="${product.price}"></span></div>
                            <button class="btn-add-cart" th:onclick="addToCart([[${product.goodsId}]])">
                                <i class="fas fa-shopping-cart"></i>
                                加入购物车
                            </button>
                        </div>
                    </div>
                </div>
            </th:block>

            <th:block th:unless="${newProductsList != null && !newProductsList.isEmpty()}">
                <div class="empty-state">
                    <div class="empty-icon">📦</div>
                    <h3 class="empty-title">暂无新品</h3>
                    <p class="empty-message">还没有新上架的商品</p>
                </div>
            </th:block>
        </div>
    </div>

    <footer>
        <p>© 2026 蛋糕系统 - 用心烘焙每一份甜蜜</p>
    </footer>

    <script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
    <script type="text/javascript" th:src="@{/js/zui.min.js}"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
    
    <script type="text/javascript">
        function addToCart(goodsId) {
            window.location.href = '/cart/addToCart?id=' + goodsId + '&from=newProducts';
        }

        function closeNotification() {
            document.getElementById('notificationOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
