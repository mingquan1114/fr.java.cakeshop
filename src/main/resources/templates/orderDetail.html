<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>订单详情</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <link type="text/css" rel="stylesheet" th:href="@{/css/main.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/zui.min.css}">
    <script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
    <script type="text/javascript" th:src="@{/js/zui.min.js}"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .gradient-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 15s infinite ease-in-out;
        }

        .circle-pink {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #ff6b9d 0%, #c44569 100%);
            top: -250px;
            left: -150px;
        }

        .circle-blue {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #4facfe 0%, #00f2fe 100%);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }

        nav {
            position: relative;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            font-size: 1.5em !important;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #4facfe, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-nav > li > a {
            color: rgba(255, 255, 255, 0.8) !important;
            transition: all 0.3s ease;
        }

        .navbar-nav > li > a:hover {
            color: #ff6b9d !important;
        }

        .main-content {
            position: relative;
            z-index: 10;
            padding: 60px 20px;
            min-height: calc(100vh - 100px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #4facfe, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            text-align: center;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-no {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .order-status {
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-paid {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
        }

        .status-shipped {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .status-completed {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #1a1a2e;
        }

        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.8);
        }

        .info-label {
            color: rgba(255, 255, 255, 0.5);
        }

        .info-value {
            font-weight: 500;
        }

        .items-section {
            margin-top: 30px;
        }

        .items-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .item-card {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            gap: 25px;
        }

        .item-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
        }

        .item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .item-intro {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .item-price {
            font-size: 24px;
            font-weight: 700;
            color: #ff6b9d;
        }

        .item-amount {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }

        .total-section {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .total-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
        }

        .total-value {
            font-size: 32px;
            font-weight: 700;
            color: #ff6b9d;
        }

        .btn-back {
            padding: 12px 40px;
            background: linear-gradient(135deg, #ff6b9d 0%, #4facfe 100%);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
        }

        .btn-container {
            text-align: center;
        }

        @media (max-width: 768px) {
            .item-card {
                flex-direction: column;
            }

            .item-image {
                width: 100%;
                height: 200px;
            }

            .page-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-circle circle-pink"></div>
        <div class="gradient-circle circle-blue"></div>
    </div>

    <nav class="navbar navbar-inverse" role="navigation">
        <div class="container-fluid" style="font-size:1.2em; padding-top:10px; padding-left:50px; padding-right:50px;">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse-example">
                    <span class="sr-only">切换导航</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" th:href="@{/goods/goodsList}">🍰 蛋糕系统</a>
            </div>
            <div class="collapse navbar-collapse navbar-collapse-example">
                <ul class="nav navbar-nav">
                    <li><a th:href="@{/goods/goodsList}">首页</a></li>
                    <li><a th:href="@{/order/orderList}">我的订单</a></li>
                    <li><a th:href="@{/user/loginout}">退出登录</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a th:href="@{/cart/myCart}">
                        <i class="fas fa-shopping-cart" style="font-size:1.5em;"></i>
                    </a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <h1 class="page-title">📦 订单详情</h1>

            <div class="order-card" th:if="${order != null}">
                <div class="card-header">
                    <div class="order-no">订单号：<span th:text="${order.id}"></span></div>
                    <span th:class="|order-status ${order.status == 2 ? 'status-paid' : (order.status == 3 ? 'status-shipped' : 'status-completed')}|">
                        <span th:text="${order.status == 2 ? '已支付' : (order.status == 3 ? '已发货' : '已完成')}"></span>
                    </span>
                </div>

                <div class="info-row">
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-user"></i> 收货人：</span>
                        <span class="info-value" th:text="${order.name}"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-phone"></i> 联系电话：</span>
                        <span class="info-value" th:text="${order.phone}"></span>
                    </div>
                </div>

                <div class="info-row">
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-map-marker-alt"></i> 收货地址：</span>
                        <span class="info-value" th:text="${order.address}"></span>
                    </div>
                </div>

                <div class="info-row">
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-credit-card"></i> 支付方式：</span>
                        <span class="info-value" th:text="${order.paytype == 1 ? '微信支付' : '支付宝'}"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-clock"></i> 下单时间：</span>
                        <span class="info-value" th:text="${order.datetime}"></span>
                    </div>
                </div>

                <div class="items-section">
                    <div class="items-title">商品明细</div>

                    <th:block th:if="${orderDetails != null && !orderDetails.isEmpty()}">
                        <div th:each="detail : ${orderDetails}" class="item-card">
                            <img th:src="@{${detail.goodsCover}}" th:alt="${detail.goodsName}" class="item-image">
                            <div class="item-info">
                                <div>
                                    <div class="item-name" th:text="${detail.goodsName}"></div>
                                    <div class="item-intro" th:text="${detail.goodsIntro}"></div>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div class="item-price">¥<span th:text="${detail.price}"></span></div>
                                    <div class="item-amount">购买数量：<span th:text="${detail.amount}"></span> 件</div>
                                </div>
                            </div>
                        </div>
                    </th:block>
                    
                    <th:block th:unless="${orderDetails != null && !orderDetails.isEmpty()}">
                        <div class="empty-items">
                            <div class="empty-icon">📦</div>
                            <p>暂无商品明细</p>
                        </div>
                    </th:block>
                </div>

                <div class="total-section">
                    <div class="total-label">订单总价</div>
                    <div class="total-value">¥<span th:text="${order.total}"></span></div>
                </div>
            </div>

            <div class="btn-container">
                <button class="btn-back" onclick="goBack()">返回订单列表</button>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function goBack() {
            window.location.href = '/order/orderList';
        }
    </script>
</body>
</html>
