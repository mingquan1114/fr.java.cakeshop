<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋糕系统 - 用户注册</title>
    
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }

        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .gradient-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 15s infinite ease-in-out;
        }

        .circle-pink {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ff6b9d 0%, #c44569 100%);
            top: -200px;
            left: -100px;
        }

        .circle-blue {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #4facfe 0%, #00f2fe 100%);
            bottom: -150px;
            right: -50px;
            animation-delay: -5s;
        }

        .circle-purple {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #a8edea 0%, #fed6e3 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        .circle-green {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #43e97b 0%, #38f9d7 100%);
            top: 20%;
            right: 15%;
            animation-delay: -3s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .register-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            position: relative;
            z-index: 1;
            overflow: hidden;
            max-height: 90vh;
            overflow-y: auto;
        }

        .register-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.1), 
                transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .register-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #4facfe 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.4);
            transition: all 0.4s ease;
            position: relative;
        }

        .logo:hover {
            transform: translateY(-8px) rotate(5deg);
            box-shadow: 0 20px 50px rgba(255, 107, 157, 0.6);
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(135deg, #ff6b9d, #4facfe, #a8edea);
            border-radius: 25px;
            z-index: -1;
            animation: rotateGradient 3s linear infinite;
        }

        @keyframes rotateGradient {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .logo i {
            font-size: 40px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .register-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d, #4facfe, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.3);
        }

        .register-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-input:focus {
            outline: none;
            border-color: #ff6b9d;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3),
                        0 0 0 3px rgba(255, 107, 157, 0.1);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .form-input:focus + .input-icon {
            color: #ff6b9d;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .toggle-password:hover {
            color: #ff6b9d;
            transform: translateY(-50%) scale(1.1);
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #4facfe 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            position: relative;
            overflow: hidden;
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.2), 
                transparent);
            transition: left 0.5s ease;
        }

        .register-btn:hover::before {
            left: 100%;
        }

        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.5);
        }

        .register-btn:active {
            transform: translateY(-1px);
        }

        .form-footer {
            margin-top: 25px;
            text-align: center;
        }

        .login-link {
            color: #ff6b9d;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-link::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff6b9d, #4facfe);
            transition: width 0.3s ease;
        }

        .login-link:hover {
            color: #a8edea;
        }

        .login-link:hover::after {
            width: 100%;
        }

        .form-footer span {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-right: 6px;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            color: #ff6b6b;
            font-size: 13px;
            animation: slideIn 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .success-message {
            background: rgba(78, 205, 196, 0.15);
            border: 1px solid rgba(78, 205, 196, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            color: #4ecdc4;
            font-size: 13px;
            animation: slideIn 0.4s ease;
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .required-mark {
            color: #ff6b6b;
            margin-left: 4px;
        }

        @media (max-width: 520px) {
            .register-container {
                margin: 15px;
                padding: 30px 20px;
            }

            .register-title {
                font-size: 24px;
            }

            .logo {
                width: 65px;
                height: 65px;
            }

            .logo i {
                font-size: 32px;
            }

            .form-input {
                padding: 12px 15px;
            }

            .register-btn {
                padding: 14px;
            }
        }
    </style>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-circle circle-pink"></div>
        <div class="gradient-circle circle-blue"></div>
        <div class="gradient-circle circle-purple"></div>
        <div class="gradient-circle circle-green"></div>
        <div class="stars" id="stars"></div>
    </div>

    <div class="register-container">
        <div class="register-header">
            <div class="logo-wrapper">
                <div class="logo">
                    <i class="fas fa-birthday-cake"></i>
                </div>
            </div>
            <h1 class="register-title">用户注册</h1>
            <p class="register-subtitle">创建账号，开启甜蜜之旅</p>
        </div>

        <form th:action="@{/user/register}" method="post">
            <div class="form-group">
                <label class="form-label">用户名<span class="required-mark">*</span></label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="username" name="username" 
                           placeholder="请输入用户名" required>
                    <i class="input-icon fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">邮箱<span class="required-mark">*</span></label>
                <div class="input-wrapper">
                    <input type="email" class="form-input" id="mail" name="mail" 
                           placeholder="请输入邮箱" required>
                    <i class="input-icon fas fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">密码<span class="required-mark">*</span></label>
                <div class="input-wrapper password-wrapper">
                    <input type="password" class="form-input" id="passwd" name="password" 
                           placeholder="请输入密码" required>
                    <i class="input-icon fas fa-lock"></i>
                    <span class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">收货人<span class="required-mark">*</span></label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="receiveName" name="receiveName" 
                           placeholder="请输入收货人名字" required>
                    <i class="input-icon fas fa-user-tag"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">收货人电话<span class="required-mark">*</span></label>
                <div class="input-wrapper">
                    <input type="tel" class="form-input" id="receivePhone" name="receivePhone" 
                           placeholder="请输入收货人联系方式" required>
                    <i class="input-icon fas fa-phone"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">收货地址<span class="required-mark">*</span></label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="receiveAddress" name="receiveAddress" 
                           placeholder="请输入收货人地址" required>
                    <i class="input-icon fas fa-map-marker-alt"></i>
                </div>
            </div>

            <button type="submit" class="register-btn">注 册</button>

            <div class="form-footer">
                <span>已有账号？</span>
                <a th:href="@{/login}" class="login-link">立即登录</a>
            </div>
        </form>
    </div>

    <script type="text/javascript">
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                starsContainer.appendChild(star);
            }
        }

        function togglePassword() {
            const passwordField = document.getElementById('passwd');
            const toggleIcon = document.querySelector('.toggle-password i');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
